tical Wavelength Location (DWDM)</li></ul><p>19</p><p>출제분야: 장비운용</p><p>광레벨관리의필요성</p><p>ㅇ광레벨이불량할경우신호가정확히전달되지않아*CV Error, *BIP Error 와같은</p><p>오류를유발하며, 보다심각한상황에서는Clock 에대한복원이어려워*LOF, *PLL</p><p>Unlock 이발생하며, *LOS 와같은링크의완전단절시키는원인이되며, 이는</p><p>최종적으로RRU *Link Fail 의원인중하나이다.</p><p>* CV(Code Violation):  8B10B coding된10bit symbol에에러가있는경우CV 카운트</p><p>* BIP (bit-interleaved parity): 전송된비트에대한에러유무를체크</p><p>* LOF(Los Of Frame): frame의Sync byte를3 Frame 동안연속하여감지하지못하는경우</p><p>에경보발생, 4 Frame 동안Frame sync 신호가정상적으로감지될경우해제</p><p>* LOS(Los Of Signal): SFP Module에서신호가실리지않은광이나광의세기가작을경우</p><p>SFP Module에서Signal Loss를Reporting 해주는알람</p><p>고객인지품질저해요소</p><ul><li>CV Error, Rx Level 저조, Link Fail로3가지장애유형존재</li></ul><p>Rx Level 저조및CV Error 발생은DU-RRU Link Fail이발생하는다양한원인중주요원인</p><p>RX Level 저조</p><p>단면오염및</p><p>커넥터타입불일치</p><p>커넥터접촉불량, 케이블불량</p><p>케이블Bending</p><p>CV Error</p><p>반사파(동일파장)</p><p>XFP &amp; SFP 오염또는불량</p><p>고온에의한오작동</p><p>MUX불량, 채널카드불량</p><p>LINK FAIL</p><p>RRU의400ms의PLL Unlock</p><p>시스템고온</p><p>Fiber 특성불량</p><p>Rx Level 저조: 심각한레벨저하는LOS가되며, Link 를단절시킴, 수신감도이하시CV</p><p>발생</p><p>CV Error : CV 다발국소는LTE 전송속도에영향을주며, HD-Voice 서비스에영향을줌</p><p>Link Fail : RRU의운영이일시적또는반복적으로중지되며, 심각한품질저해요소</p><p><strong>광장비_공통 Ring-MUX 광레벨</strong></p><p>20</p><p>경보설명</p><p>항목</p><p>설명</p><p>경보조건</p><p>LOS</p><p>(Los Of</p><p>Signal)</p><ul><li>SFP 모듈에서신호가실리지않은</li></ul><p>광이나광의세기가작을경우</p><p>SFP 모듈에서Signal Loss 를</p><p>Reporting 해주는기능</p><ul><li>Optical Power는정상이나Modulation이없는경우</li><li>Modulation은정상이나Rx Power가낮아Signal을</li></ul><p>인식하지못하는경우</p><p>LOF</p><p>(Los Of</p><p>Frame)</p><ul><li>OTU3C: Sync Byte K28.5 Hyper</li></ul><p>Frame의sync 표시</p><ul><li>OTU10G: Sync word A1,A2로10G</li></ul><p>Frame의Sync 표시</p><ul><li>입력되는Frame에서연속으로3 Frame 동안Frame</li></ul><p>Sync 신호를감지하지못하는경우</p><ul><li>LOF 경보상태에서연속으로4 Frame 동안Frame</li></ul><p>Sync 신호가정상적으로감지될경우</p><p>CV</p><p>(Code</p><p>Violation)</p><ul><li>CPE Port(CPRI, OBSAI) Data Error</li></ul><p>측정을위해8B10B CV Count하여</p><p>표시한다.</p><ul><li>CV 1개count는10 bit에오류가</li></ul><p>발생한것과같다</p><ul><li>오류코드수(선로성능) 수집하여누적</li><li>LOS경보시동작안함</li><li>Decode된10bit symbol의RD가rule을위배한경우</li><li>CV Error 발생(RD 값은언제나-1,+1을유지해야함)</li></ul><p>ES</p><p>(Errored</p><p>Second)</p><ul><li>CV가발생한단위초또는ES가</li></ul><p>발생한시간</p><ul><li>1초마다수집된에러또는발생한초단위시간을</li><li>ES로간주하여누적한다</li></ul><p>SES</p><p>(Severely</p><p>Errored</p><p>Seconds)</p><ul><li>전체bit 중CV Error가과하게(전</li></ul><p>체Bit의30%이상) 발생한초의수</p><ul><li></li></ul><p>UAS</p><p>(Unavaila</p><p>ble</p><p>Seconds)</p><ul><li>LOS, SES상태10초간지속시동작</li><li>LOS 또는LOF 가발생</li></ul><p>(Link 가단절된) 한초의수</p><ul><li></li></ul><p><strong>광장비_공통 Ring-MUX 광레벨</strong></p><p>21</p><ul><li>IBN(IP Backhaul NMS)</li></ul><p>SK telecom의IP 백홀망에존재하는네트워크자원을통합하여관리하는시스템을말한다</p><p>분산된네트워크자원을효율적으로관리하기위한중앙관리방식에의해모든네트워크장비</p><p>및운영에필요한시스템들에대해구성,성능,고장관리및systelm Log, Ping 관리,관리서버</p><p>감시기능을이용하여전체망에대한감시및통계,분석등네트워크자원관리에필요한제반기</p><p>능을수행하는시스템이다.</p><p>출제분야: 장비운용</p><p><strong>광장비_공통 IBN</strong></p><p>IBN</p><p>(IP Backhaul</p><p>NMS)</p><ul><li>1. 종합감시</li><li>2. 실시간고장</li><li>3. 실시간SysLog</li><li>4. 통계분석</li><li>5. 정류기감시</li></ul><p>메뉴</p><p>메뉴</p><p>종합 감시</p><p>전송실 단위 IBS/L2/L3/WIFI L2 장비 실시간 고장감시</p><p>실시간 고장</p><p>전송장비 IBS/L2/L3/WIFI L2 실시간 감시(Access IFMS와 동일유형)</p><p>실시가 Syslog</p><p>전송장비 실시간 Log감시</p><p>통계분석</p><p>전송장비 고장이력통계 및 성능조회(CPU 부하율등.)</p><p>정류기 감시</p><p>PTS &amp; 정류기 감시(정류기 감시의 AC/DC확인)</p><p>22</p><p><strong>광장비_Solid Ring-MUX</strong></p><p>출제분야: 장비운용</p><p>23</p><div class="memo-box"><div class="memo-box-title">💡 핵심 포인트</div><div class="memo-text">Ring-MUX: WDM방식 광변환장치. COT↔RT. Long Path≤20km, Short Path≤10km</div></div>'

>OTU10G Port간Clock 편차수용규격</p><p>전송pointer 처리규격적용1)</p><p>→DU 출력간편차가발생하는경우, data를오류없이전달하기위하여, 전송규격인pointer 처리</p><p>규격을적용.</p><p>→OTU10G는port간±100ppm clock 편차수용가능</p><p>3GPP 규격2)을만족시키는DU 신호입력시, 동일품질의신호를RU로전달함</p><ul><li>1) ITUT 규격G.709 – Clock 편차흡수를위해pointer 처리기능이있어야한다는내용포함됨</li><li>2) RF Rx Frequency error  ±0.05 ppm</li></ul><p>Port간Clock 편차</p><p>출제분야: 장비운용</p><p><strong>광장비_HFR-OTU10G(1x4 10G Sub-rate MUX Card)</strong></p><p>Clock 설정은AUTO와MANUAL 2가지가능.</p><p>AUTO로설정시, 10G내의임의의1개PORT를대표Clock으로수용해서카드전체사용.</p><p>(현재CD다발및품질불량이슈로, MANUAL로전체설정)</p><p>MANUAL로설정시, 강제로1개PORT를대표Clock으로지정함.</p><p>(설정된PORT DOWN시해당카드내의나머지PORT가Link fail, 다발알람등등발생)</p><p>**MANUAL로설정된PORT가장애발생시, 필히다른PORT를REF_CLOCK로지정필요!!!</p><p>OTU10G Clock 설정종류및특징</p><p>출제분야: 장비운용</p><p>교체할MCUD에TeraTerm접속, Serial Port지정후Baud rate 38400으로변경</p><p>rtrv-sys; 명령어로현재MCUD에대한시스템정보확인</p><p>NETWORK_ID, NODE_ID를현재조치대상국소로변경필요</p><p><strong>광장비_HFR Ring-MUX MCUD 교체</strong></p><p>출제분야: 장비운용</p><p>49</p><p>출제분야: 장비운용</p><p>COT, RT에따라서TeraTerm에서IP를확인하고CIT에서형상-자동망구성을한다.</p><p>IP범위</p><p>COT : 192.168.180.1~ 192.168.180.1</p><p>RT   : 192.168.1.152~ 192.168.1.152</p><p>(현재링먹스의IP를필수로확인한다)</p><p>링MUX MCUD 교체– IP설정하기</p><p>①구성정보-&gt; 시스템설정백업및복원클릭</p><p>②설정명령성공후자동백업사용체크</p><p>스케줄링시스템백업사용체크해제</p><p>③수동백업및복원클릭</p><p>1</p><p>2</p><p>3</p><p>링MUX MCUD 교체- 시스템설정백업및복원</p><p><strong>광장비_HFR Ring-MUX MCUD 교체</strong></p><p>50</p><p>출제분야: 장비운용</p><p>그룹명에서백업할그룹선택후노드명선택에서백업할장비선택</p><p>장치백업정보저장클릭</p><p>1</p><p>2</p><p>1</p><p>2</p><p>백업데이터업로드클릭후“예(Y)” 클릭후업로드성공확인</p><p>백업데이터파일저장클릭후파일저장위치지정하여저장후저장완료</p><p>4</p><p>5</p><p>1</p><p>2</p><p>3</p><p>6</p><p><strong>광장비_HFR Ring-MUX MCUD 교체</strong></p><p>51</p><p>출제분야: 장비운용</p><p>백업정보장치에설정클릭후백업데이터파일에서읽기클릭</p><p>복원할파일선택후열기클릭</p><p>1</p><p>2</p><p>3</p><p>4</p><p>복원파일선택후“백업데이터다운로드” 클릭후“예(Y)” 클릭</p><p>암호입력창에admin(default password) 입력후확인</p><p>재부팅경보메시지확인후확인</p><p>(주의) 설정복원시시스템이재부팅되며기존설정내용삭제됨</p><p>Default : admin</p><p>1</p><p>2</p><p>3</p><p>4</p><p><strong>광장비_HFR Ring-MUX MCUD 교체</strong></p>< var thUnit=null,thChOpen={},thChDone={};
function thLoadState(){try{var d=localStorage.getItem('jb_th_v1');if(d)thChDone=JSON.parse(d).done||{};}catch(e){}}
function thSaveState(){try{localStorage.setItem('jb_th_v1',JSON.stringify({done:thChDone}));}catch(e){}}
thLoadState();

function thRenderHome(){
  thUnit=null;
  document.getElementById('th-hdr-title').textContent='이론학습';
  document.getElementById('th-hdr-sub').textContent='단원을 선택하세요';
  var h='<div class="th-banner"><div class="th-ban-t">📚 장비운용 이론</div><div class="th-ban-s">단원을 선택해 학습을 시작하세요</div></div><div class="th-ugrid">';
  TH_UNITS.forEach(function(u,ui){
    var tot=u.chapters.length, dn=u.chapters.filter(function(_,ci){return thChDone[u.id+'_'+ci];}).length;
    h+='<div class="th-ucard" onclick="thOpenUnit('+ui+')" ontouchstart="">';
    h+='<div class="th-uemoji">'+u.emoji+'</div>';
    h+='<div class="th-uinfo"><div class="th-uname">'+u.name+'</div><div class="th-udesc">'+u.desc+'</div>';
    h+='<div class="th-uprog">'+dn+'/'+tot+' 챕터 완료</div></div>';
    h+='<div style="font-size:18px;color:#CBD5E1;">›</div></div>';
  });
  h+='</div>';
  document.getElementById('th-content').innerHTML=h;
}

function thOpenUnit(idx){
  thUnit=TH_UNITS[idx];
  thChOpen={};
  document.getElementById('th-hdr-title').textContent=thUnit.name;
  document.getElementById('th-hdr-sub').textContent=thUnit.desc;
  thRenderChapters();
}

function thRenderChapters(){
  var u=thUnit;
  var h='<div class="th-clist">';
  h+='<button class="th-cback" onclick="thRenderHome()" ontouchstart="">← 단원 목록</button>';
  h+='<div class="th-ubar">'+u.emoji+' '+u.name+'</div>';
  u.chapters.forEach(function(ch,ci){
    var key=u.id+'_'+ci;
    var isOpen=!!thChOpen[key];
    var isDone=!!thChDone[key];
    h+='<div class="th-citem">';
    h+='<div class="th-chdr" onclick="thToggle('+ci+')" ontouchstart="">';
    h+='<div class="th-cnum">'+(ci+1)+'</div>';
    h+='<div class="th-ctit">'+ch.title+'</div>';
    if(isDone)h+='<span class="th-cdone">✅</span>';
    h+='<div class="th-carr'+(isOpen?' open':'')+'">›</div>';
    h+='</div>';
    if(isOpen){
      h+='<div class="th-cbody open">';
      h+='<button class="th-speak-btn" onclick="thSpeak('+ci+')" ontouchstart=""><span>🔊</span> 음성으로 듣기</button>';
      h+=ch.content;
      if(!isDone)h+='<button class="th-done-btn" onclick="thDone('+ci+')" ontouchstart="">✅ 챕터 완료</button>';
      h+='</div>';
    }else{
      h+='<div class="th-cbody"></div>';
    }
    h+='</div>';
  });
  h+='</div>';
  document.getElementById('th-content').innerHTML=h;
}

function thToggle(ci){var k=thUnit.id+'_'+ci;thChOpen[k]=!thChOpen[k];thRenderChapters();}
function thDone(ci){thChDone[thUnit.id+'_'+ci]=true;thSaveState();thRenderChapters();}

function thSpeak(ci){
  var ch=thUnit.chapters[ci];
  ttsCurrentTitle=ch.title;
  var div=document.createElement('div');
  div.innerHTML=ch.content;
  var text=ch.title+'. '+(div.innerText||div.textContent||'').replace(/\s+/g,' ').trim();
  ttsChunks=ttsChunk(text);ttsIdx=0;ttsPaused=false;
  document.getElementById('tts-bar').className='tts-bar';
  ttsDoSpeak();
}

y Cell Group) Bearer. 5G망: Data 전송이gNB를통해전송되는Bearer 3) Split Bearer. SKT 5G 망은gNB NR PDCP 에서Data Split 시행함 - Data 전송이gNB와eNB를통해동시에전송되는Bearer - Down Link에서사용하며NR + LTE CA를의미함 [5G_공통] NSA와SA 방식 다. Control Plane - 단말과eNB(RRC Message) 또는단말과MME(NAS Message)간초기동조및Handover 등 제어를위한기능담당 - Common Control Ch.과Dedicated Control Ch.이포함 라. User Plane - User Traffic의이동경로를의미 - Data Traffic Channel(DL, UL Shared Channel)이해당됨 - SKT/ LGU+ : 5G + LTE CA 동작으로속도우선정책 - KT : NR Only 동작으로Latency 우선정책 SKT KT LGU+ Split bearer NR only Split bearer 출제분야: 장비운용 8 가. 5G + LTE 1CC(P-Cell) EN-DC 동작하며, LTE 주파수우선순위에따라S-Cell Addition 나. UL NR Only/LTE Only - 5G 단말의UL은NR Only 또는LTE Only로만동작 다. UL Split Bearer ON - 5G 단말의UL이LTE + NR 또는LTE Only로동작 [5G_공통] NSA와SA 방식 출제분야: 장비운용 9 가. EPS Fallback - LTE 초기사용시WCDMA네트워크천이시켜제공하는기능(CSFB) -> 이후VoLTE 기능개발로 LTE 망자체음성서비스지원 - 5G 자체음성서비스(VoNR) 개발전LTE 네트워크천이로음성지원. 이기능을EPS Fallback이라한다 - 5G SA망에Connected된UE가음성서비스필요시5G 시스템은RRC Connection 을 Release하면서단말에게음성서비스를제공할LTE Cell의주파수정보를전달. 단말은해당 주파수의LTE Cell로Camping하여VoLTE를수행하여서비스를제공하게된다. 나. VoNR(Voice over NR) - 5G 네트워크망으로음성서비스제공해주는기능 - LTE 네트워크로Redirection 없이Gnb 및5GC(5G CORE)를통해IMS망과연동. - Redirection등의네트워크천이절차가없기때문에EPS Fallback 방식에비해빠르게 서비스설정이가능 - 네트워크천이실패등의요인이없어보다안정적인서비스제공 다. RRC Release(DL-DCCH) - LTE 망으로천이하기위해RRC Connection을해제. 단말에게Redirect 할LTE 주파수정보를 전달하여단말이해당주파수대역의LTE 네트워크로천이하여VoLTE를실행하도록한다. 예제) 5G SA 서비스가현재시범구축중이다5G에서는아직음성서비스를할수없어LTE로전환하여음 성을서비스할예정인데5G망에있다가LTE 망으로전환시키는이과정의명칭은무엇인가요? EPS Fallback [5G_공통] NSA와SA 방식 출제분야: 장비운용 10 ■핵심기술: 네트워크슬라이싱(Network Slicing) ㅇSA 방식에서만가능한가장중요한기능 ㅇ하나의망을여러개의독립적인가상네트워크로분리하여, 서비스특성에맞는자원을할당 • 초고속슬라이스: 대용량스트리밍, VR/AR • 초저지연슬라이스: 자율주행, 스마트팩토리제어 • 저전력/광대역슬라이스: 수많은IoT 기기연결 ■방식별장단점 NSA (비단독형) 장점: 기존LTE 망을활용하므로초기구축비용이저렴함. LTE와5G 대역을동시사용하여이론상최고다운로드속도가빠를수있음. 단점: 신호제어를위해LTE망을항상연결해야하므로스마트폰배터리소모가큼. 5G의진정한특징인\'초저지연\' 구현에한계가있음. SA (단독형) 장점 • 초저지연성: 반응속도가극대화되어자율주행, 원격의료등에필수적임. • 네트워크슬라이싱: 물리적인망하나를가상으로쪼개어용도별(게임용, 기업용등) 맞춤형서비스제공가능. • 배터리효율: 5G 신호만처리하므로단말기전력소모가약10~15% 절감됨. 단점 • 전국망구축을위한초기투자비용이매우높음. [예제] 다음  3.5GHz TDD Timming 동기및Symbol 비율획득기능 - IRCS 상위서버혹은GUI에서설정한TDD-UL-DL-Configuration 정보로TDD 동작을위한 스위칭신호를생성한다 - TDD-UL-DL-Configuration 정보 →SIB1 UL-DL-Configuration-Common 정보: DL Slot 수, DL Symbol 수, UL Slot 수, UL Symbol 수, DL-UL-Transmission Periodicity, GP Symbol Length, GP Symbol Location →Subcarrier Spacing - TDD-UL-DL-Configuration은다음과같으며, 아래의Sensitivity 및Sync 정확도를가진다. →Configuration 설정에맞게Switching pulse 생성: DDDSU(4:1) →Input sensitivity: -110dBm@SS RSRP(-76dBm@Full RB) →Sync 정확도: ±2us 244 [중계기_공통] RF-TRIO-3.5 출제분야: 장비운용 ■AGC(Auto Gain Control) Algorithm 1) AGC Mode #1 각Path의DL 입력신호가정격범위내인경우DL 출력신호세기를항상 (설정출력±2)dB로유지하도록DL이득을제어하는기능이다. 이때, UL 이득은 ((DL 이득-Gain Balance)±2)dB가유지되어야한다. 2) AGC Mode #2 5G NR 및LTE DL RB 수변화에따른입력신호세기차이에무관하게일정한커버리지를 유지하도록DL 이득을제어하는기능이다. AGC Mode #2에서DL 이득은RB수0%~100% 에서2dB이내로유지되며UL 이득은((DL 이득-Gain Balance)±2)dB가유지된다. 3) 서비스별Default AGC Mode 서비스대역 AGC Mode Default LTE-1.8 #1 & #2 #2 LTE-2.1 #2 #1 WCDMA 5G NR 3.5G 100MHz #2 5G NR 3.5G 100+αMHz #2 245 [중계기_공통] RF-TRIO-3.5 출제분야: 장비운용 ■ASD(Auto Shut Down)기능및Alarm : RF-TRIO-3.5는장비각Path의DL 입력및출력, UL 출력을감시하여문제발생시다음과 같이대응하는ASD(Auto-Shut-Down) 기능을제공한다. 이기능은S/W적인Shut-down 기능으로(최종단Amp. On/off 또는내부atten. Max. 등) Shut-down 조건발생시DL 및 UL Path가동시에동작한다. 1) DL 과입력, DL/UL 과출력Shutwown 및Alarm 각Path의DL 입력및출력이정격을초과시에는해당Path를자동으로Shutdown하는 기능을제공한다. 동작Level은(정격최대입력+3)±2dB, (정격출력+3)±2dB 이며, 동작 Algorithm 은아래그림과같다. - PLL Unlock시에는H/W적으로즉시알람및shut-down을수행하고, 해제시복귀된다 2) DL 인근사업자신호과입력Alarm - DL 인근사업자신호가자사신호대비25dB±2dB 이상유입되는경우이를인지하고 IRCS에Alarm을보고하는기능을제공 - Alarm은정상상태는아니지만서비스에는문제가없는Alarm이므로LED는Yellow (황색)가점등 3) DL 신호저출력Alarm - 각Service Band의DL 신호가(정격-10)dB±2dB 이하인경우이를인지하고IRCS에 보고하는기능이제공 - Alarm은정상상태도아니지만서비스에는문제가없는Alarm이므로LED는Yellow (황색)가점등 246 [중계기_공통] RF-TRIO-3.5 출제분야: 장비운용 ■ASD(Auto Shut Down)기능및Alarm 1) UL 과입력ALC - UL 신호과입력Saturation에의한신호품질의열화방지를위해UL LNA (Low Noise Amplifier) 후단에ALC용Attenuator를구비하여RF특성을유지하는 기능을제공한다. - 자사신호과입력으로ALC가동작하는경우줄어든UL 이득을보상한다. - UL 과입력ALC의동작신호세기범위는아래표와같으며, 타사과입력ALC 동작에의한 UL 이득변화를허용한다. 구분 과입력범위 LTE-1.8 -40 dBm ~ -17dBm LTE-2.1 -41 dBm ~ -17dBm WCDMA 5G NR 3.5G 100MHz -32 dBm ~ -17dBm 5G NR 3.5G 100+αMHz 2) UL 과출력ALC - 각Path의UL 이득은AGC 기능에따라동작하되, UL 출력Level이항상(정격출력±2dB) 이하가유지되도록하는기능을제공한다. - LTE-2.1 과WCDMA 에서Path 일부를공유하는경우, LTE-2.1 ul 출력ALC 동작에의해 WCDMA Path 의이득이저하되지않도록최대30dB 까지자동으로WCDMA UL 이득을보상하는기능을제공한다. - 5G NR 3.5G 100MHz+α MHz 에서각Path 일부를공유하는경우, 하나의100MHz 대역UL 출력ALC 동작에의해또다른α MHz 대역Path 의이득이저하되지않도록 최대30dB 까지자동으로UL 이득을보상하는기능을제공한다. 247 [중계기_공통] RF-TRIO-3.5 출제분야: 장비운용 ■주요보상및감시, 측정기능 1) Isolation 측정기능 - DL Isolation을측정하고GUI에서Display할수있는기능이제공한다. - Isolation 측정정확도는(Gain+10)dB ~ (Gain+20)dB 범위에서±3dB 이내로한다. 최대측정Isolation 범위는Gain+20dB이다. - 측정Data는일정용량까지저장되며지난데이터는자동폐기되고새Data로 업데이트되며항상최근100개Data를1시간단위로보관한다. - GUI에서화면으로Display하거나저장data를PC로Export해야한다. - Isolation 측정값이Gain+7dB 이내로30초이상유지될경우발진으로판정하여 Alarm으로보고한다. (발진에의한Shutdown은하지않음) - 각대역별Isolation을측정하여Isolation이확보가되지않을경우Alarm을 발생시켜Local GUI 및IRCS에보고한다. - Alarm 조건: 5G NR(Gain + 20dB 이하), LTE(Gain + 15dB 이하) Alarm 레벨은설정 가능하다.(Local GUI, IRCS) 2) UL Gain 감시기능 - UL Gain을감시하여UL Gain이규격이하가되는경우, UL Gain Alarm을발생 시키는기능을제공한다. - UL Path는2구간으로나누어감시한다. 구간#1은LNA부터Digital Board(Down Converter 구간)까지이며예상이득보다10±3dB 이하가되는경우 Alarm을발생시키며, 구간#2는Digital Board부터HPA후단(Up Converter 구간)까지 이며, 예상이득보다15±5dB 이하가되는경우Alarm을발생시킨다 - UL Gain 감시는실시간으로실시하고구간#1, 구간#2중하나의Alarm이발생할 경우IRCS로보고한다 3) Gain Balance - Gain Balance는정상운용상태에서DL과UL 이득을동일하게유지하되, UL신호가 기지국잡음레벨에영향을줄때운용자판단에따라UL Gain 을DL 보다낮게설정 할수있도록추가로가변감쇄기를내장한다 - Gain Balance 범위: 0~10dB 248 [중계기_공통] RF-TRIO-3.5 출제분야: 장비운용 4) 파형감시기능 - DL/UL파형을시각화하여볼수있는기능을제공한다. 단, 본기능은Local GUI에서만 제공한다. - Waveform은Channel Filter 전단및후단의신호모두를시각화할수있다. - 출력Power를표시하며, Marker를이용하여peak power 측정및Delta marker를 이용하여파워차이를표시할수있다 5) Digital Board 상태감시기능 - Digital Board의정상동작여부를감시(Digital Clock, FPGA Configuration, ADC/DAC Calibration)하여이상발생시, 필요한경우서비스중단후IRCS에보고하는기능을 제공한다. 6) Log 저장기능 - Local GUI에서RF-TRIO-3.5의Alarm, Event 및Control 기록을Time Stamp와함께 최근항목100개까지저장할수있는기능을제공한다. 7) 전파환경측정 - 5G NR cell 전파환경을주기적으로측정하여측정된전파환경항목을메모리에 저장하고, GUI에수치로표시한다. ( var QZ_CATS=[
  {key:'all',label:'전체 랜덤',emoji:'🎲',filter:function(){return true;}},
  {key:'5g',label:'5G 장비운용',emoji:'📡',filter:function(q){return q.category==='5G';}},
  {key:'lte',label:'LTE 장비운용',emoji:'📶',filter:function(q){return q.category==='LTE';}},
  {key:'ring',label:'광장비/중계기/측정기',emoji:'💡',filter:function(q){return q.category==='Ring';}},
  {key:'bside',label:'부대설비',emoji:'⚡',filter:function(q){return q.category==='부대';}},
  {key:'mc',label:'4지선다형',emoji:'📋',filter:function(q){return q.type==='mc';}},
  {key:'short',label:'단답형',emoji:'✏️',filter:function(q){return q.type==='short';}}
];

var qzCurQ=[],qzIdx=0,qzAnswered=[],qzWrongList=[];

function qzRenderHome(){
  document.getElementById('qz-hdr-sub').textContent='카테고리를 선택하세요';
  var stats=document.getElementById('qz-stats');
  var catCounts={};
  QZ_DATA.forEach(function(q){catCounts[q.category]=(catCounts[q.category]||0)+1;});
  stats.innerHTML=
    '<div class="qz-stat"><div class="qz-stat-num">'+QZ_DATA.length+'</div><div class="qz-stat-lbl">전체</div></div>'+
    '<div class="qz-stat"><div class="qz-stat-num">'+(catCounts['5G']||0)+'</div><div class="qz-stat-lbl">5G</div></div>'+
    '<div class="qz-stat"><div class="qz-stat-num">'+(catCounts['LTE']||0)+'</div><div class="qz-stat-lbl">LTE</div></div>'+
    '<div class="qz-stat"><div class="qz-stat-num">'+(catCounts['Ring']||0)+'</div><div class="qz-stat-lbl">Ring</div></div>';
  var catGrid=document.getElementById('qz-cats');
  var h='';
  QZ_CATS.forEach(function(cat,ci){
    var cnt=QZ_DATA.filter(cat.filter).length;
    h+='<div class="qz-cat-card" onclick="qzStart('+ci+')" ontouchstart="">';
    h+='<div class="qz-cat-icon">'+cat.emoji+'</div>';
    h+='<div class="qz-cat-info"><div class="qz-cat-name">'+cat.label+'</div>';
    h+='<div class="qz-cat-cnt">'+cnt+'문제</div></div>';
    h+='<div class="qz-cat-arr">›</div></div>';
  });
  catGrid.innerHTML=h;
  qzShowQzScreen('qz-home');
}

function qzShowQzScreen(id){
  ['qz-home','qz-q-screen','qz-result-screen','qz-review-screen'].forEach(function(s){
    var el=document.getElementById(s);
    if(el)el.className=el.className.replace(' on','').replace('on','').trim();
  });
  var el=document.getElementById(id);
  if(el)el.className+=' on';
}

function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}
  return arr;
}

function qzStart(catIdx){
  var cat=QZ_CATS[catIdx];
  var qs=QZ_DATA.filter(cat.filter);
  qs=shuffle(qs.slice());
  qzCurQ=qs;qzIdx=0;
  qzAnswered=new Array(qs.length).fill(null);
  qzWrongList=[];
  document.getElementById('qz-hdr-sub').textContent=cat.label+' ('+qs.length+'문제)';
  qzShowQzScreen('qz-q-screen');
  qzRenderQ();
}

function qzRenderQ(){
  var q=qzCurQ[qzIdx];
  var pct=Math.round((qzIdx+1)/qzCurQ.length*100);
  document.getElementById('qz-prog').style.width=pct+'%';
  document.getElementById('qz-num').textContent=(qzIdx+1)+' / '+qzCurQ.length;
  document.getElementById('qz-badge').textContent=q.category+(q.type==='short'?' · 단답':'');
  document.getElementById('qz-q').textContent=q.question;
  var ans=qzAnswered[qzIdx];
  var opts=document.getElementById('qz-opts');
  opts.innerHTML='';
  
  if(q.type==='mc'&&q.options){
    q.options.forEach(function(opt,oi){
      var btn=document.createElement('button');
      btn.className='qz-opt';
      btn.textContent=opt;
      if(ans!==null){
        btn.classList.add('disabled');
        if(oi===q.answer)btn.classList.add('correct');
        else if(oi===ans)btn.classList.add('wrong');
      }
      btn.setAttribute('ontouchstart','');
      btn.onclick=function(){qzPick(oi);};
      opts.appendChild(btn);
    });
  }else{
    // 단답형
    var wrap=document.createElement('div');
    wrap.className='qz-short-wrap';
    var tap=document.createElement('div');
    tap.className='qz-short-tap'+(ans!==null?' revealed':'');
    tap.setAttribute('ontouchstart','');
    if(ans!==null){
      tap.textContent='정답: '+q.answer;
    }else{
      tap.textContent='👆 터치하면 정답 공개';
      tap.onclick=function(){qzPick(0);};
    }
    wrap.appendChild(tap);
    opts.appendChild(wrap);
  }
  
  var ex=document.getElementById('qz-ex');
  ex.textContent=q.explanation||'';
  ex.className='qz-ex-box'+(ans!==null&&q.explanation?' show':'');
  var nb=document.getElementById('qz-next-btn');
  nb.textContent=qzIdx<qzCurQ.length-1?'다음 ▶':'결과 보기 ▶';
}

function qzPick(oi){
  if(qzAnswered[qzIdx]!==null)return;
  qzAnswered[qzIdx]=oi;
  var q=qzCurQ[qzIdx];
  if(q.type==='mc'&&oi!==q.answer){qzWrongList.push(qzIdx);}
  qzRenderQ();
}

function qzPrev(){if(qzIdx>0){qzIdx--;qzRenderQ();}}
function qzNext(){
  if(qzIdx<qzCurQ.length-1){qzIdx++;qzRenderQ();}
  else{qzShowResult();}
}

function qzShowResult(){
  var mcQs=qzCurQ.filter(function(q){return q.type==='mc';});
  var correct=0;
  qzCurQ.forEach(function(q,i){
    if(q.type==='mc'&&qzAnswered[i]===q.answer)correct++;
  });
  var total=mcQs.length||qzCurQ.length;
  document.getElementById('res-score').textContent=correct;
  document.getElementById('res-total').textContent=total;
  document.getElementById('res-pct').textContent=(total>0?Math.round(correct/total*100):0)+'%';
  document.getElementById('res-correct').textContent=correct;
  document.getElementById('res-wrong').textContent=total-correct;
  qzShowQzScreen('qz-result-screen');
}

function qzRetry(){qzIdx=0;qzAnswered=new Array(qzCurQ.length).fill(null);qzWrongList=[];qzRenderQ();qzShowQzScreen('qz-q-screen');}

function qzShowWrong(){
  if(!qzWrongList.length){alert('오답이 없어요! 완벽해요 🎉');return;}
  var h='<div style="font-size:14px;font-weight:800;color:#374151;margin-bottom:12px;">❌ 오답 복습 ('+qzWrongList.length+'문제)</div>';
  qzWrongList.forEach(function(idx,n){
    var q=qzCurQ[idx],myAns=qzAnswered[idx];
    h+='<div class="qz-review-item"><div class="qz-review-num">오답 '+(n+1)+'번</div>';
    h+='<div class="qz-review-q">'+q.question+'</div>';
    if(q.type==='mc'&&q.options){
      h+='<div class="qz-review-wrong">내 답: '+(q.options[myAns]||'?')+'</div>';
      h+='<div class="qz-review-correct">정답: '+q.options[q.answer]+'</div>';
    }else{
      h+='<div class="qz-review-correct">정답: '+q.answer+'</div>';
    }
    if(q.explanation)h+='<div class="qz-review-ex">💡 '+q.explanation+'</div>';
    h+='</div>';
  });
  document.getElementById('qz-review-list').innerHTML=h;
  qzShowQzScreen('qz-review-screen');
}
function qzGoHome(){qzRenderHome();qzShowQzScreen('qz-home');}

/* ===== TTS (iOS 호환 청크 방식) ===== */
var ttsChunks=[],ttsIdx=0,ttsCurrentTitle='',ttsPaused=false,ttsTimer=null;
function ttsChunk(text){
  var chunks=[],cur='';
  var parts=text.split(/(?<=[.?!,。、])\s*/);
  for(var i=0;i<parts.length;i++){
    var p=parts[i];
    if((cur+p).length>120&&cur.trim()){chunks.push(cur.trim());cur=p;}
    else cur+=p+' ';
  }
  if(cur.trim())chunks.push(cur.trim());
  return chunks.length?chunks:[text.slice(0,100)];
}
function ttsDoSpeak(){
  if(ttsIdx>=ttsChunks.length){
    document.getElementById('ttsPlayBtn').textContent='▶ 재생';
    clearInterval(ttsTimer);return;
  }
  window.speechSynthesis.cancel();
  var utt=new SpeechSynthesisUtterance(ttsChunks[ttsIdx]);
  utt.lang='ko-KR';
  utt.rate=parseFloat(document.getElementById('ttsSpeedSel').value)||1.0;
  utt.onend=function(){if(!ttsPaused){ttsIdx++;ttsDoSpeak();}};
  utt.onerror=function(e){if(e.error!=='interrupted'){ttsIdx++;setTimeout(ttsDoSpeak,200);}};
  window.speechSynthesis.speak(utt);
  document.getElementById('ttsPlayBtn').textContent='⏸ 일시정지';
  document.getElementById('ttsTitle').textContent=ttsCurrentTitle+' ('+(ttsIdx+1)+'/'+ttsChunks.length+')';
  clearInterval(ttsTimer);
  ttsTimer=setInterval(function(){
    if(window.speechSynthesis.speaking&&!ttsPaused){
      window.speechSynthesis.pause();window.speechSynthesis.resume();
    }
  },10000);
}
function ttsPlayPause(){
  if(window.speechSynthesis.speaking&&!ttsPaused){
    ttsPaused=true;window.speechSynthesis.pause();
    document.getElementById('ttsPlayBtn').textContent='▶ 재생';
  }else if(ttsChunks.length){ttsPaused=false;ttsDoSpeak();}
}
function ttsStop(){
  window.speechSynthesis.cancel();
  clearInterval(ttsTimer);ttsPaused=false;ttsChunks=[];ttsIdx=0;
  document.getElementById('tts-bar').className='tts-bar hidden';
  document.getElementById('ttsPlayBtn').textContent='▶ 재생';
}
function ttsChangeSpeed(){
  if(window.speechSynthesis.speaking){
    var idx=ttsIdx;
    window.speechSynthesis.cancel();
    clearInterval(ttsTimer);
    setTimeout(function(){ttsIdx=idx;ttsDoSpeak();},200);
  }
}
document.addEventListener('visibilitychange',function(){
  if(!document.hidden&&window.speechSynthesis&&window.speechSynthesis.paused&&!ttsPaused)
    window.speechSynthesis.resume();
});

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>OEL 장비운용 3급</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-text-size-adjust:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;background:#F8FAFC;color:#1E293B;max-width:480px;margin:0 auto;min-height:100vh;}
[onclick],button{touch-action:manipulation;-webkit-tap-highlight-color:transparent;cursor:pointer;}

/* ── 허브 ── */
#sc-hub{background:#0F172A;min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;text-align:center;}
#sc-hub.on{display:flex;}
.hub-badge{background:rgba(37,99,235,.3);border:1px solid #3B82F6;color:#93C5FD;font-size:12px;font-weight:700;padding:5px 16px;border-radius:20px;margin-bottom:18px;display:inline-block;}
.hub-dday{font-size:52px;font-weight:900;color:#FBBF24;line-height:1;}
.hub-exam{font-size:16px;color:#fff;font-weight:700;margin:8px 0 4px;}
.hub-sub{font-size:13px;color:#64748B;margin-bottom:32px;}
.hub-cards{display:flex;flex-direction:column;gap:14px;width:100%;max-width:380px;}
.hub-card{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:20px;padding:18px 20px;display:flex;align-items:center;gap:14px;text-align:left;}
.hub-card:active{transform:scale(.97);}
.hub-icon{font-size:34px;flex-shrink:0;}
.hub-info{flex:1;}
.hub-name{font-size:16px;font-weight:800;color:#F1F5F9;margin-bottom:3px;}
.hub-desc{font-size:11px;color:#94A3B8;line-height:1.5;}
.hub-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:5px;}
.t-blue{background:rgba(37,99,235,.35);color:#93C5FD;}
.t-green{background:rgba(16,185,129,.35);color:#6EE7B7;}
.hub-arr{font-size:20px;color:#475569;}

/* ── 이론 ── */
#sc-theory{display:none;padding-bottom:80px;}
#sc-theory.on{display:block;}
.th-hdr{background:linear-gradient(135deg,#1E3A5F,#2563EB);color:#fff;padding:12px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;}
.th-hdr-back{background:rgba(255,255,255,.2);border:none;border-radius:8px;color:#fff;padding:6px 12px;font-size:12px;font-weight:700;}
.th-hdr-info{flex:1;}
.th-hdr-title{font-size:15px;font-weight:800;}
.th-hdr-sub{font-size:10px;opacity:.8;}
.th-banner{background:linear-gradient(135deg,#0F172A,#1E40AF);color:#fff;padding:18px;text-align:center;}
.th-ban-t{font-size:20px;font-weight:900;margin-bottom:4px;}
.th-ban-s{font-size:12px;opacity:.8;}
.th-ugrid{padding:12px;}
.th-ucard{background:#fff;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:12px;}
.th-ucard:active{transform:scale(.98);}
.th-uemoji{font-size:26px;width:40px;text-align:center;}
.th-uinfo{flex:1;}
.th-uname{font-size:14px;font-weight:800;margin-bottom:2px;}
.th-udesc{font-size:11px;color:#64748B;}
.th-uprog{font-size:11px;font-weight:700;color:#2563EB;margin-top:3px;}
.th-clist{padding:12px;}
.th-cback{display:flex;align-items:center;gap:6px;background:#fff;border:none;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;color:#1E3A5F;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.th-ubar{background:linear-gradient(135deg,#1E3A5F,#2563EB);color:#fff;border-radius:12px;padding:13px;margin-bottom:12px;text-align:center;font-size:15px;font-weight:900;}
.th-citem{background:#fff;border-radius:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden;}
.th-chdr{display:flex;align-items:center;padding:13px;gap:10px;}
.th-cnum{width:24px;height:24px;border-radius:50%;background:#EFF6FF;color:#2563EB;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.th-ctit{flex:1;font-size:13px;font-weight:700;color:#1E293B;}
.th-carr{font-size:12px;color:#94A3B8;transition:transform .2s;}
.th-carr.open{transform:rotate(90deg);}
.th-cdone{font-size:11px;color:#10B981;font-weight:700;}
.th-cbody{display:none;padding:0 13px 13px;border-top:1px solid #F1F5F9;}
.th-cbody.open{display:block;}
.th-cbody p{font-size:12.5px;line-height:1.9;margin:5px 0;color:#1E293B;}
.th-cbody ul{margin:6px 0 6px 16px;}
.th-cbody li{font-size:12.5px;line-height:1.9;color:#374151;}
.th-cbody strong{color:#1E40AF;}
.memo-box{background:linear-gradient(135deg,#F0F9FF,#E0F2FE);border:1.5px solid #7DD3FC;border-radius:12px;padding:12px 14px;margin:10px 0;}
.memo-box-title{font-size:11px;font-weight:900;color:#0369A1;margin-bottom:6px;}
.memo-text{font-size:12px;line-height:1.8;color:#1E40AF;}
.th-speak-btn{display:flex;align-items:center;justify-content:center;gap:6px;background:linear-gradient(135deg,#0369A1,#2563EB);border:none;border-radius:10px;color:#fff;padding:10px 14px;font-size:13px;font-weight:700;width:100%;margin:10px 0 4px;}
.th-done-btn{width:100%;padding:10px;background:#7C3AED;color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700;margin-top:12px;}

/* ── 퀴즈 ── */
#sc-quiz{display:none;padding-bottom:20px;}
#sc-quiz.on{display:block;}
.qz-hdr{background:linear-gradient(135deg,#0F172A,#1E3A5F);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;}
.qz-hdr-back{background:rgba(255,255,255,.2);border:none;border-radius:8px;color:#fff;padding:6px 12px;font-size:12px;font-weight:700;}
.qz-hdr-info{flex:1;}
.qz-hdr-title{font-size:15px;font-weight:800;}
.qz-hdr-sub{font-size:10px;opacity:.7;}
.qz-home{padding:16px;}
.qz-hero{background:linear-gradient(135deg,#1E3A5F,#2563EB);border-radius:20px;padding:20px;text-align:center;color:#fff;margin-bottom:16px;}
.qz-hero-title{font-size:20px;font-weight:900;margin-bottom:6px;}
.qz-hero-sub{font-size:12px;opacity:.8;}
.qz-stat-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.qz-stat{background:#fff;border-radius:12px;padding:10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.qz-stat-num{font-size:18px;font-weight:900;color:#2563EB;}
.qz-stat-lbl{font-size:10px;color:#64748B;margin-top:2px;}
.qz-section-title{font-size:13px;font-weight:800;color:#374151;margin-bottom:10px;}
.qz-cat-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.qz-cat-card{background:#fff;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.qz-cat-card:active{transform:scale(.98);}
.qz-cat-icon{font-size:24px;width:36px;text-align:center;flex-shrink:0;}
.qz-cat-info{flex:1;}
.qz-cat-name{font-size:13px;font-weight:800;color:#1E293B;margin-bottom:2px;}
.qz-cat-cnt{font-size:11px;color:#64748B;}
.qz-cat-arr{font-size:16px;color:#CBD5E1;}
/* 문제풀기 */
.qz-screen{display:none;}
.qz-screen.on{display:block;}
.qz-prog-wrap{background:#E2E8F0;height:4px;}
.qz-prog-bar{background:linear-gradient(90deg,#2563EB,#7C3AED);height:4px;transition:width .3s;}
.qz-body{padding:16px;}
.qz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.qz-num{font-size:12px;color:#64748B;font-weight:700;}
.qz-badge{font-size:11px;background:#EFF6FF;color:#2563EB;padding:3px 8px;border-radius:10px;font-weight:700;}
.qz-q{font-size:14px;font-weight:700;color:#1E293B;line-height:1.7;margin-bottom:14px;}
.qz-opts{display:flex;flex-direction:column;gap:8px;}
.qz-opt{background:#fff;border:2px solid #E2E8F0;border-radius:12px;padding:12px 14px;font-size:13px;text-align:left;transition:all .15s;width:100%;}
.qz-opt:active{transform:scale(.99);}
.qz-opt.correct{background:#ECFDF5;border-color:#10B981;color:#065F46;font-weight:700;}
.qz-opt.wrong{background:#FFF1F2;border-color:#EF4444;color:#BE123C;}
.qz-opt.disabled{pointer-events:none;}
/* 단답형 */
.qz-short-wrap{margin-bottom:12px;}
.qz-short-tap{background:#fff;border:2px dashed #CBD5E1;border-radius:14px;padding:20px;text-align:center;font-size:13px;color:#94A3B8;font-weight:600;}
.qz-short-tap.revealed{border-style:solid;border-color:#10B981;background:#ECFDF5;color:#065F46;font-size:15px;font-weight:800;}
.qz-ex-box{background:#FFFBEB;border:1px solid #FDE68A;border-radius:12px;padding:12px 14px;margin-top:12px;font-size:12.5px;line-height:1.7;color:#92400E;display:none;}
.qz-ex-box.show{display:block;}
.qz-nav{display:flex;gap:8px;margin-top:14px;}
.qz-nav-btn{flex:1;padding:12px;border:none;border-radius:12px;font-size:13px;font-weight:700;}
.qz-prev{background:#F1F5F9;color:#374151;}
.qz-next{background:linear-gradient(135deg,#2563EB,#7C3AED);color:#fff;}
/* 결과 */
.qz-result{padding:20px;}
.qz-result-card{background:linear-gradient(135deg,#1E3A5F,#2563EB);border-radius:20px;padding:24px;text-align:center;color:#fff;margin-bottom:16px;}
.qz-score-big{font-size:60px;font-weight:900;line-height:1;}
.qz-score-label{font-size:14px;opacity:.8;margin-top:6px;}
.qz-score-pct{font-size:20px;font-weight:700;margin-top:8px;}
.qz-result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.qz-result-cell{background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.qz-result-num{font-size:24px;font-weight:900;color:#2563EB;}
.qz-result-lbl{font-size:11px;color:#64748B;margin-top:2px;}
.qz-result-btns{display:flex;flex-direction:column;gap:8px;}
.qz-result-btn{padding:14px;border:none;border-radius:14px;font-size:14px;font-weight:700;}
.qz-btn-retry{background:linear-gradient(135deg,#2563EB,#7C3AED);color:#fff;}
.qz-btn-wrong{background:#FFF1F2;color:#BE123C;border:1.5px solid #FDA4AF;}
.qz-btn-home{background:#F1F5F9;color:#374151;}
.qz-review{padding:16px;}
.qz-review-item{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.qz-review-num{font-size:11px;color:#64748B;margin-bottom:6px;}
.qz-review-q{font-size:13px;font-weight:700;line-height:1.6;margin-bottom:8px;}
.qz-review-wrong{background:#FFF1F2;border-radius:8px;padding:8px 10px;font-size:12px;color:#BE123C;margin-bottom:4px;}
.qz-review-correct{background:#ECFDF5;border-radius:8px;padding:8px 10px;font-size:12px;color:#065F46;font-weight:700;margin-bottom:4px;}
.qz-review-ex{background:#FFFBEB;border-radius:8px;padding:8px 10px;font-size:12px;color:#92400E;margin-top:4px;}

/* TTS 바 */
.tts-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:linear-gradient(135deg,#0F172A,#1E3A5F);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:8px;z-index:300;box-shadow:0 -4px 20px rgba(0,0,0,.3);transition:transform .3s;}
.tts-bar.hidden{transform:translateX(-50%) translateY(100%);}
.tts-btn{background:rgba(255,255,255,.15);border:none;border-radius:16px;color:#fff;padding:6px 12px;font-size:12px;font-weight:700;touch-action:manipulation;cursor:pointer;white-space:nowrap;}
.tts-title{flex:1;font-size:11px;opacity:.8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tts-speed{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);border-radius:8px;color:#fff;font-size:11px;padding:5px 4px;}
</style>
</head>
<body ontouchstart="">

<div id="sc-hub" class="on">
  <span class="hub-badge">OEL Access 장비운용 3급</span>
  <div class="hub-dday" id="hub-dday">D-??</div>
  <div class="hub-exam">시험일 2026년 9월 3일</div>
  <div class="hub-sub">매일 조금씩, 반드시 합격!</div>
  <div class="hub-cards">
    <div class="hub-card" onclick="goApp('theory')" ontouchstart="">
      <div class="hub-icon">📚</div>
      <div class="hub-info">
        <div class="hub-name">이론학습</div>
        <div class="hub-desc">5G·LTE·광장비·부대설비<br>41개 챕터 + 🔊 음성 듣기</div>
        <span class="hub-tag t-blue">4단원 · 음성 지원</span>
      </div>
      <div class="hub-arr">›</div>
    </div>
    <div class="hub-card" onclick="goApp('quiz')" ontouchstart="">
      <div class="hub-icon">🎯</div>
      <div class="hub-info">
        <div class="hub-name">문제풀기</div>
        <div class="hub-desc">PDF 예제 전체 273문제<br>단답형 + 4지선다 혼합</div>
        <span class="hub-tag t-green">카테고리별 풀기</span>
      </div>
      <div class="hub-arr">›</div>
    </div>
  </div>
</div>

<div id="sc-theory">
  <div class="th-hdr">
    <button class="th-hdr-back" onclick="goApp('hub')" ontouchstart="">← 홈</button>
    <div class="th-hdr-info">
      <div class="th-hdr-title" id="th-hdr-title">이론학습</div>
      <div class="th-hdr-sub" id="th-hdr-sub">단원을 선택하세요</div>
    </div>
  </div>
  <div id="th-content"></div>
</div>

<div id="sc-quiz">
  <div class="qz-hdr">
    <button class="qz-hdr-back" onclick="goApp('hub')" ontouchstart="">← 홈</button>
    <div class="qz-hdr-info">
      <div class="qz-hdr-title">문제풀기</div>
      <div class="qz-hdr-sub" id="qz-hdr-sub">카테고리를 선택하세요</div>
    </div>
  </div>
  <div id="qz-content">
    <div id="qz-home" class="qz-screen qz-home on">
      <div class="qz-hero">
        <div class="qz-hero-title">🎯 문제풀기</div>
        <div class="qz-hero-sub">PDF 예제 전체 수록 · 카테고리별 풀기</div>
      </div>
      <div class="qz-stat-row" id="qz-stats"></div>
      <div class="qz-section-title">📂 카테고리 선택</div>
      <div class="qz-cat-grid" id="qz-cats"></div>
    </div>
    <div id="qz-q-screen" class="qz-screen">
      <div class="qz-prog-wrap"><div class="qz-prog-bar" id="qz-prog" style="width:0%"></div></div>
      <div class="qz-body">
        <div class="qz-meta">
          <span class="qz-num" id="qz-num">1 / 1</span>
          <span class="qz-badge" id="qz-badge"></span>
        </div>
        <div class="qz-q" id="qz-q"></div>
        <div id="qz-opts" class="qz-opts"></div>
        <div class="qz-ex-box" id="qz-ex"></div>
        <div class="qz-nav">
          <button class="qz-nav-btn qz-prev" onclick="qzPrev()" ontouchstart="">◀ 이전</button>
          <button class="qz-nav-btn qz-next" onclick="qzNext()" ontouchstart="" id="qz-next-btn">다음 ▶</button>
        </div>
      </div>
    </div>
    <div id="qz-result-screen" class="qz-screen qz-result">
      <div class="qz-result-card">
        <div class="qz-score-big" id="res-score">0</div>
        <div class="qz-score-label">정답 / <span id="res-total">0</span>문제</div>
        <div class="qz-score-pct" id="res-pct">0%</div>
      </div>
      <div class="qz-result-grid">
        <div class="qz-result-cell"><div class="qz-result-num" id="res-correct">0</div><div class="qz-result-lbl">정답</div></div>
        <div class="qz-result-cell"><div class="qz-result-num" id="res-wrong" style="color:#EF4444">0</div><div class="qz-result-lbl">오답</div></div>
      </div>
      <div class="qz-result-btns">
        <button class="qz-result-btn qz-btn-retry" onclick="qzRetry()" ontouchstart="">🔄 다시 풀기</button>
        <button class="qz-result-btn qz-btn-wrong" onclick="qzShowWrong()" ontouchstart="">❌ 오답 복습</button>
        <button class="qz-result-btn qz-btn-home" onclick="qzGoHome()" ontouchstart="">← 카테고리 선택</button>
      </div>
    </div>
    <div id="qz-review-screen" class="qz-screen qz-review">
      <button class="th-cback" onclick="qzGoHome()" ontouchstart="">← 문제 목록</button>
      <div id="qz-review-list"></div>
    </div>
  </div>
</div>

<div class="tts-bar hidden" id="tts-bar">
  <button class="tts-btn" onclick="ttsPlayPause()" ontouchstart="" id="ttsPlayBtn">▶ 재생</button>
  <span class="tts-title" id="ttsTitle">음성 준비 중...</span>
  <select class="tts-speed" onchange="ttsChangeSpeed()" id="ttsSpeedSel" ontouchstart="">
    <option value="0.8">0.8x</option>
    <option value="1.0" selected>1.0x</option>
    <option value="1.2">1.2x</option>
    <option value="1.5">1.5x</option>
  </select>
  <button class="tts-btn" onclick="ttsStop()" ontouchstart="">■ 정지</button>
</div>

<script>
/* ===== 앱 네비게이션 ===== */
function goApp(app){
  ['sc-hub','sc-theory','sc-quiz'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.className=el.className.replace(' on','').replace('on','');
  });
  var target=document.getElementById('sc-'+app);
  if(target)target.className+=' on';
  if(app==='theory'){thRenderHome();}
  else if(app==='quiz'){qzRenderHome();}
  else{ttsStop();}
  window.scrollTo(0,0);
}

/* ===== D-Day 계산 ===== */
(function(){
  var exam=new Date('2026-09-03');
  var now=new Date();
  var diff=Math.ceil((exam-now)/(1000*60*60*24));
  document.getElementById('hub-dday').textContent='D-'+diff;
})();

/* ===== 이론 데이터 ===== */
var TH_UNITS=[
{
id:'5g',
name:'5G 장비운용',
emoji:'📡',
desc:'5G 도입배경~인빌딩~제조사별 운용',
chapters:[

title:'5G 도입배경과 Use Case',
content:'<p><strong>5G_공통 도입배경</strong></p><p>1.</p><p>모바일데이터트래픽의폭발적인증가</p><p>2.</p><p>네트워크에접속된디바이스들의급격한증가</p><p>3.</p><p>모든것은클라우드위에올린다.</p><p>4.</p><p>현장감높은미디어서비스들의활성화</p><p>5.</p><p>빅데이터분석을통한지식서비스진화</p><ul><li>전세계에서만들어진데이터의양이현재전세계모든데이터의90% 차지</li><li>네트워크에접속한가입자, 사물, 데이터, 각종프로세스등다양한컨넥티드디바이스들이증가추세</li><li>기존의다양한비즈니스들이클라우드기반의융합서비스로전환</li><li>UHD+, 3D, 홀로그램등매우현실적으로느껴지는(Hyper-realistic) 미디어기술이진보하면서관련</li></ul><p>서비스들의수준도나날이높아짐</p><ul><li>라디오로연주를들을때마치현장에서듣는듯한느낌, 이런ICT 변혁에서생성되는데이터들을</li></ul><p>분석하면서새로운가치를창출하는지식들이서비스로서제공</p><p><strong>5G_공통 Use Case</strong></p><ul><li>1. eMBB(enhanced Mobile BroadBand)</li><li>가상현실같은대용량콘텐츠를초실감형으로제공</li><li>이동중이나스포츠경기, 콘서트장과같은밀집지역에서도안정적으로트래픽을전송</li><li>2. URLLC(Ultra-Reliable and Low Latency Communications)</li><li>5G는1ms 이하의전송지연이가능(기존LTE에서50~60ms의지연속도)</li><li>자율주행, 원격제어, 응급서비스등저지연이매우중요한서비스로의료, 자율주행등분야에서</li></ul><p>신뢰성있는서비스제공에필수</p><ul><li>3. mMTC(massive Machine Type Communications)</li><li>다수의센서를요구하거나에너지효율높은IoT 서비스</li><li>스마트시티, 스마트홈, 스마트미터, 트래킹, 웨어러블서비스분야에적용</li></ul><p><strong>5G_공통 NSA와SA 방식</strong></p><ul><li></li></ul><p>NSA (Non-Standalone, 비단독형) : 5G 안테나(기지국)를사용하되, 데이터제어와</p><p>핵심망(Core)은기존4G LTE 설비에의존하는과도기적방식</p><ul><li>단말의이동성(mobility) 관리등을담당하는제어플레인(control plane)의동작은</li></ul><p>4G LTE 망을활용하면서사용자플레인(User plane/Data plane)에해당하는데이터</p><p>트래픽은5G 망으로주고받음</p><ul><li>LTE 기지국: 음성, control 시그널, LTE 데이터</li><li>5G 기지국: 5G 데이터</li><li></li></ul><p>SA (Standalone, 단독형) : 제어부와데이터전송모두5G 전용설비를사용하는</p><p>완전한5G 방식</p><ul><li>제어채널이나데이터채널모두5G의자체구조를사용하는구조</li><li>주요개념정의</li><li>기술적사양비교</li></ul><p>구분</p><p>NSA (비단독형)</p><p>SA (단독형)</p><p>코어네트워크</p><p>4G EPC (Evolved Packet Core)</p><p>5G Core (5GC)</p><p>기본구조</p><p>LTE + 5G 결합(EN-DC)</p><p>5G 단독사용</p><p>지연시간</p><p>비교적높음(LTE 경유)</p><p>초저지연(Ultra-low latency)</p><p>배터리효율</p><p>낮음(LTE/5G 동시접속)</p><p>높음(5G만접속)</p><p>핵심기술</p><p>단순속도향상</p><p>네트워크슬라이싱, MEC</p><p>출제분야: 장비운용</p><p>5</p><div class="memo-box"><div class="memo-box-title">💡 핵심 포인트</div><div class="memo-text">eMBB(초고속)·URLLC(초저지연)·mMTC(대규모IoT) 3대 Use Case 반드시 암기</div></div>'

content:'<p><strong>5G_공통 NSA와SA 방식</strong></p><ul><li></li></ul><p>NSA (Non-Standalone, 비단독형) : 5G 안테나(기지국)를사용하되, 데이터제어와</p><p>핵심망(Core)은기존4G LTE 설비에의존하는과도기적방식</p><ul><li>단말의이동성(mobility) 관리등을담당하는제어플레인(control plane)의동작은</li></ul><p>4G LTE 망을활용하면서사용자플레인(User plane/Data plane)에해당하는데이터</p><p>트래픽은5G 망으로주고받음</p><ul><li>LTE 기지국: 음성, control 시그널, LTE 데이터</li><li>5G 기지국: 5G 데이터</li><li></li></ul><p>SA (Standalone, 단독형) : 제어부와데이터전송모두5G 전용설비를사용하는</p><p>완전한5G 방식</p><ul><li>제어채널이나데이터채널모두5G의자체구조를사용하는구조</li><li>주요개념정의</li><li>기술적사양비교</li></ul><p>구분</p><p>NSA (비단독형)</p><p>SA (단독형)</p><p>코어네트워크</p><p>4G EPC (Evolved Packet Core)</p><p>5G Core (5GC)</p><p>기본구조</p><p>LTE + 5G 결합(EN-DC)</p><p>5G 단독사용</p><p>지연시간</p><p>비교적높음(LTE 경유)</p><p>초저지연(Ultra-low latency)</p><p>배터리효율</p><p>낮음(LTE/5G 동시접속)</p><p>높음(5G만접속)</p><p>핵심기술</p><p>단순속도향상</p><p>네트워크슬라이싱, MEC</p><p>출제분야: 장비운용</p><p>5</p><ul><li>NSA, EN-DC, Split Bearer</li><li>1. NSA(Non Stand Alone) vs SA(Stand Alone)</li></ul><p>가. NSA(Non Stand Alone) System에서4G와5G를결합시켜전송속도를향상시키는기술</p><p>나. 망구성</p><ul><li>1) NSA(LTE + NR)</li><li>음성, Control signal, LTE Data →LTE 기지국에서전송</li><li>NR Data → NR 기지국에서전송</li><li>2) SA(NR Only)</li><li>NR 관련정보/ Data 모두NR 기지국에서전송</li><li>NSA방식은Signaling은기존LTE 망을통하여처리하고User Traffic은ENDC구조로</li></ul><p>LTE 5G망을통하여전달함</p><ul><li>SA방식은Access 및Core가모두5G전용장비로구성되어Signaling / User Traffic 모두가</li></ul><p>5G 망에서처리되어보다빠른호처리가가능함</p><ul><li>SA방식의5GC(5G Core)장비주요역할</li></ul><p>장비</p><p>약어</p><p>주요역할설명</p><p>AMF</p><p>Access and Mobility</p><p>Management Function</p><p>단말에대한인증,연결관리,이동성관리를지원하는Control Plane</p><p>NF(Network Function)</p><p>SMF</p><p>Session Management</p><p>Function</p><p>단말에대한session 관리,IP 주소관리, UPF관리및QoS제어를</p><p>수행하는Control Plane NF</p><p>UPF</p><p>User Plane Function</p><p>단말이동에대한Anchor Point 역할을수행하며단말과</p><p>DN사이의Gateway역할Packet 처리전달등의역할을수행하는</p><p>User Plane NF</p><p>SMSF</p><p>Short Message Service</p><p>Function</p><p>SMS 서비스인증등을수행하며AMF와는Infra를연동</p><p>DN</p><p>Data Network</p><p>IP 및Non-IP기반Service제공을위한Data network</p><p><strong>5G_공통 NSA와SA 방식</strong></p><p>출제분야: 장비운용</p><p>6</p><p>다. NSA/SA 호처리절차</p><ul><li>1) NSA 에서는Paging과SIB정보가eNB를통해전달되며, Initial Access 후에는NR 채널을통해</li></ul><p>자원할당등데이터전달을위한정보가전달됨</p><ul><li>2) NSA (LTE + NR)</li><li>3) SA (NR Only)</li><li>4) NSA 동조절차</li></ul><p><strong>5G_공통 NSA와SA 방식</strong></p><p>출제분야: 장비운용</p><p>7</p><ul><li>2. EN-DC(E-UTRAN New Radio –Dual Connectivity)</li></ul><p>가. SKT 5G 망은NSA Option 3x 방식을사용하며RRC Signaling Message는LTE M-eNB를통해</p><p>MME로전송되고, Data Traffic은5G gNB의PDCP에서분리(SCG Split Bearer)되어</p><p>gNB와eNB의RLC로전송됨</p><p>나. 5G Bearer Type</p><ul><li>1) MCG(Master Cell Group), 2) SCG(Secondary Cell Group), 3) Split Bearer로구성</li><li>1) MCG(Master Cell Group) Bearer. LTE망: Data 전송이eNB를통해전송되는Bearer</li><li>2) SCG(Secondary Cell Group) Bearer. 5G망: Data 전송이gNB를통해전송되는Bearer</li><li>3) Split Bearer. SKT 5G 망은gNB NR PDCP 에서Data Split 시행함</li><li>Data 전송이gNB와eNB를통해동시에전송되는Bearer</li><li>Down Link에서사용하며NR + LTE CA를의미함</li></ul><p><strong>5G_공통 NSA와SA 방식</strong></p><p>다. Control Plane</p><ul><li>단말과eNB(RRC Message) 또는단말과MME(NAS Message)간초기동조및Handover 등</li></ul><p>제어를위한기능담당</p><ul><li>Common Control Ch.과Dedicated Control Ch.이포함</li></ul><p>라. User Plane</p><ul><li>User Traffic의이동경로를의미</li><li>Data Traffic Channel(DL, UL Shared Channel)이해당됨</li><li>3. 사업자별NR 운용</li><li>SKT/ LGU+ : 5G + LTE CA 동작으로속도우선정책</li><li>KT : NR Only 동작으로Latency 우선정책</li></ul><p>SKT</p><p>KT</p><p>LGU+</p><p>Split bearer</p><p>NR only</p><p>Split bearer</p><p>출제분야: 장비운용</p><p>8</p><ul><li>4. UL Split Bearer (PDCP)</li></ul><p>가. 5G + LTE 1CC(P-Cell) EN-DC 동작하며, LTE 주파수우선순위에따라S-Cell Addition</p><p>나. UL NR Only/LTE Only</p><ul><li>5G 단말의UL은NR Only 또는LTE Only로만동작</li></ul><p>다. UL Split Bearer ON</p><ul><li>5G 단말의UL이LTE + NR 또는LTE Only로동작</li></ul><p><strong>5G_공통 NSA와SA 방식</strong></p><p>출제분야: 장비운용</p><p>9</p><ul><li>5. SA 주요기능</li></ul><p>가. EPS Fallback</p><ul><li>LTE 초기사용시WCDMA네트워크천이시켜제공하는기능(CSFB) -&gt; 이후VoLTE 기능개발로</li></ul><p>LTE 망자체음성서비스지원</p> title:'FDD/TDD와 Slot Format',
content:'<p><strong>5G_공통 FDD / TDD 비교</strong></p><p>ㅇ. FDD(Frequency Division Duplex) :</p><ul><li>DL 과UL 주파수가분리되어있음</li><li>무선망설계용이</li><li>상/하향비대칭구조구성불가능</li><li>DL 과UL 주파수사이에guard band가있어주파수효율성감소</li></ul><p>ㅇ. TDD(Time Division Duplex) :</p><ul><li>DL 과UL 같은주파수사용</li><li>Guard Band 불필요, 상/하향비대칭구성용이에따른주파수효율성증대</li><li>무선망설계의민감성증대</li><li>DL 과UL 사이에guard time이있다. Time delay 에민감</li></ul><p><strong>5G_공통 5G TDD System</strong></p><p>출제분야: 장비운용</p><ul><li>1. 광대역주파수확보의용이성</li></ul><p>ㅇFDD의한계: FDD는데이터송신(UL)과수신(DL)을위해쌍을이루는두개의주파수대역이필요, 고주파</p><p>대역에서대칭적인넓은빈공간을찾기는매우어려움</p><p>ㅇTDD의장점: 하나의주파수대역만있으면되므로, 3.5GHz나28GHz 같은초고주파(mmWave) 대역의</p><p>광대역주파수를훨씬효율적으로활용할수있음(DL/UL 동일주파수사용으로효율성개선)</p><ul><li>2. 하향(DL)과상향(UL)의비대칭성조절</li></ul><p>ㅇ유연한자원배분: TDD는시간축을쪼개서사용하므로, 트래픽상황에따라DL과UL의시간비율을</p><p>조정가능(예: DL 80%, UL 20%)</p><p>ㅇ효율성: 트래픽수요에맞춰자원을유동적으로배분할수있어전체적인시스템효율이높음.</p><ul><li>3. Massive MIMO와의기술적궁합(채널상호성)</li></ul><p>ㅇ5G의핵심기술인Massive MIMO(대용량다중입출력)를구현하는데TDD는결정적인역할</p><p>ㅇ채널상호성(Channel Reciprocity): TDD는송수신주파수가같기때문에, 기지국이단말로부터받는신호를</p><p>통해상향/하향채널의상태를모두파악이가능</p><p>15</p><p><strong>5G_공통 TDD 구조</strong></p><ul><li>Radio Frame : (시간축) 10개의Sub-Frame으로이루어진10 ms</li><li>1Slot : (시간축) 14개의Symbol로이루어진0.5ms 주기를가지는단위</li><li>1Sub-Carrier : (주파수축)30KHz의주파수대역을가진최소단위</li><li>1RB : (시간/주파수축)12개Sub-Carrier(360KHz)</li></ul><p><strong>5G_공통 TDD 배열</strong></p><p><strong>5G_공통 Slot Format</strong></p><p>S slot Format 32번사용</p><p><strong>5G_공통 Guard Symbol</strong></p><p>출제분야: 장비운용</p><p>19</p><p>GP 1 Symbol 사용시</p><p>→1.9km 커버리지가능</p><p>GP 2 Symbol 사용시</p><p>→ 7.3km 커버리지가능</p><p><strong>5G_공통 CLI (Cross Link Interference)</strong></p><div class="memo-box"><div class="memo-box-title">💡 핵심 포인트</div><div class="memo-text">TDD: 비대칭 UL/DL 심볼비. Slot Format 0(All DL) ~ Format 34 암기</div></div>'
},

title:'SCS/RB/속도계산',
content:'<p><strong>5G_공통 SCS (SubCarrier Spacing)</strong></p><p>출제분야: 장비운용</p><p>21</p><p><strong>5G_공통 RB/ 점유폭/ SCS 계산식</strong></p><p><strong>5G_공통 5G NR frame structure/5G 속도계산</strong></p><p>LTE</p><p>NR</p><p>3.5GHz</p><p>28GHz</p><p>SCS</p><p>15 kHz</p><p>30 kHz</p><p>120 kHz</p><p>TTI</p><p>1 ms</p><p>0.5 ms</p><p>0.125 ms</p><p>Duplex 방법</p><p>FDD</p><p>TDD</p><p>LTE 대비NR 3.5GHz의최소자원(RE) 단위는주파수2배, 시간½배이며, 100MHz의RB수는273개</p><p>LTE 대비NR 28GHz의최소자원(RE) 단위는주파수8배, 시간⅛배이며, 400MHz의RB수는264개</p><p>UL/DL 자원이주파수축에서나뉘던LTE와는달리, NR은TDD 사용으로UL/ DL 자원을시간축에서</p><p>분리DDDSU</p><ul><li>5G 기지국최대속도계산</li></ul><p>출제분야: 장비운용</p><p>23</p><p><strong>5G_공통 NR frame structure/5G 속도계산</strong></p><p><strong>5G_공통 SSB 구성</strong></p><p>SSB DL 데이터전송전커버리지결정</p><ul><li>초기접속시동기화를위해사용</li><li>PCI : (LTE) 504개, mod3 | (NR) 1,008개, mod4</li><li>빔sweeping을통한커버리지이득</li><li>Initial 빔search를위해사용</li><li>2개SS block (SSB)가한slot 내배치, 각SSB는4심볼로구성</li><li>규격상최대3.5GHz 8개SSB / 28GHz 64 SSB 사용가능</li><li>SSB 개수에따라장/단점이존재하므로셀특성에따른최적개수有</li><li>Handover 위한RSRP 계산</li><li>SSS 내RE의신호strength 평균인SS-RSRP 통해핸드오버여부결정</li></ul><p>ㅇPSS(Primary Synchronization Signal)</p><p>☞Symbol 주기획득, 주파수동조, Cell group ID에서Cell ID 획득(3 hypotheses)</p><p>ㅇSSS(secondary Synchronization Signal)</p><p>☞Cell group ID 획득(336 hypotheses), CP-length detection</p><p>ㅇPBCH(Physical Broadcast Channel)</p><p>☞무선단말이네트워크/셀에접속하는데필요한셀시스템정보전송</p><div class="memo-box"><div class="memo-box-title">💡 핵심 포인트</div><div class="memo-text">SCS 15/30/60/120kHz. 1 RB=12 서브캐리어. 속도=RB수×SCS×변조차수×코딩율×레이어수</div></div>'

title:'SSB/CSI-RS/Reference Signal',
content:'<p><strong>5G_공통 SSB 구성</strong></p><p>SSB DL 데이터전송전커버리지결정</p><ul><li>초기접속시동기화를위해사용</li><li>PCI : (LTE) 504개, mod3 | (NR) 1,008개, mod4</li><li>빔sweeping을통한커버리지이득</li><li>Initial 빔search를위해사용</li><li>2개SS block (SSB)가한slot 내배치, 각SSB는4심볼로구성</li><li>규격상최대3.5GHz 8개SSB / 28GHz 64 SSB 사용가능</li><li>SSB 개수에따라장/단점이존재하므로셀특성에따른최적개수有</li><li>Handover 위한RSRP 계산</li><li>SSS 내RE의신호strength 평균인SS-RSRP 통해핸드오버여부결정</li></ul><p>ㅇPSS(Primary Synchronization Signal)</p><p>☞Symbol 주기획득, 주파수동조, Cell group ID에서Cell ID 획득(3 hypotheses)</p><p>ㅇSSS(secondary Synchronization Signal)</p><p>☞Cell group ID 획득(336 hypotheses), CP-length detection</p><p>ㅇPBCH(Physical Broadcast Channel)</p><p>☞무선단말이네트워크/셀에접속하는데필요한셀시스템정보전송</p><p><strong>5G_공통 SSB,CSI-RS</strong></p><p>출제분야: 장비운용</p><p>26</p><p><strong>5G_공통 5G NR RSRP : SS-RSRP &amp; CSI-RSRP</strong></p><p>출제분야: 장비운용</p><p><strong>5G_공통 SSB,CSI-RS</strong></p><p>출제분야: 장비운용</p><p>28</p><p><strong>5G_공통 5G NR Reference Signal</strong></p><p>출제분야: 장비운용</p><p>29</p><ul><li>. Time Offset</li><li>Time Offset 은Normal CP(Cyclic Prefix)의기준값대비틀어짐정도를나타내는값으로CP가틀어지면</li></ul><p>DU/UL Timing 동기가깨지며타사와심볼비도맞지않게됨</p><p>→CP(Cyclic Prefix) 란guard interval 만큼Symbol의끝부분신호를복사해서앞부분에붙여주며OFDM</p><p>신호의직교성을살리는것을말함</p><p>구분</p><p>LTE</p><p>5G 3.5Ghz</p><p>Parameter/Numerlogy(μ)</p><p>0</p><p>1</p><p>SCS(Subcarrier Spacing)(kHz)</p><p>15</p><p>30</p><p>OFDM Symbol Duration((μs)</p><p>66.67</p><p>33.33</p><p>Cyclic Prefix Duration((μs)</p><p>4.69</p><p>2.34</p><p>OFDM Symbol Duration including CP((μs)</p><p>71.35</p><p>35.68</p><p><strong>5G_공통 Time Offset</strong></p><div class="memo-box"><div class="memo-box-title">💡 핵심 포인트</div><div class="memo-text">SSB: 동기신호블록(PSS+SSS+PBCH). CSI-RS: 채널품질측정. SRS: 상향링크 참조신호</div></div>'
},

title:'Beamforming/Massive MIMO/안테나',
content:'<p><strong>5G_공통 5G Beamforming 이득결정</strong></p><p>출제분야: 장비운용</p><p>32</p><p><strong>5G_공통 5G NR RSRP : SS-RSRP &amp; CSI-RSRP</strong></p><p>출제분야: 장비운용</p><p>5G / NR, 3GPP 38.215 : SS-RSRP, CSI-RSRP</p><p>LTE에서전력측정은기본적으로RSRP 및RSRQ에관한것입니다. NR의RSRQ와RSRP는LTE와거의동일하지만</p><p>차이점도있습니다. LTE에서RSRQ 및RSRP는셀특정참조신호를기반으로하지만NR에는CRS가없으므로NR에</p><p>서RSRP 및RSRQ의정의는다른물리적신호를기반으로정의됩니다.</p><p>38.215는주로UE / UG-RAN의측정을기술한다. 현재38.215에는SS-RSRP 및CSI-RSRP가제안되어있습니다.</p><p>SS-RSRP (동기화신호참조신호수신전력)</p><p>SS 기준신호수신전력(SS-RSRP)은2 차동기신호(SS)를운반하는자원요소의전력기여도([W])에대한선형평</p><p>균으로정의됩니다.SS-RSRP의측정시간자원SS / PBCH 블록측정시간구성(SMTC) 창기간내에한정되어있</p><p>습니다.3GPP TS 38.214로구성을보고하여구성된L1-RSRP에SS-RSRP를사용하는경우SMTC 창기간에의한측</p><p>정시간자원제한적용되지않습니다.</p><p>각RE에서동기신호의평균전력.</p><p>SMTC에서윈도우기간동안측정이이루어집니다.</p><p>물리방송채널(PBCH)에대한SS-RSRP 결정복조기준신호및상위계층에의해지시되는경우, 2 차동기신호</p><p>외에CSI 기준신호가사용될수있다.PBCH 또는CSI 기준신호에대한복조기준신호를사용하는SS-RSRP 3GPP</p><p>TS 38.213에정의된기준신호에대한전력스케일링을고려하여해당기준신호를전달하는자원요소의전력기</p><p>여도에대해선형평균을측정하여측정합니다. L1-RSRP에SS-RSRP를사용하지않는경우추가사용SS-RSRP 결</p><p>정을위한CSI 기준신호는적용되지않습니다.</p><p>이에더하여, CSI 기준신호는하이레벨구성을통해동기화신호와함께사용될수있다.</p><p>SS-RSRP가L1의RSRP로사용되지않으면추가CSI 기준신호가적용되지않습니다.</p><p>SS-RSRP는동일한SS / PBCH 블록인덱스및동일한물리계층셀아이덴티티를갖는SS / PBCH 블록에대응하는</p><p>참조신호들중에서만측정되어야한다.</p><p>33</p><p><strong>5G_공통 5G NR Reference Signal</strong></p><p>출제분야: 장비운용</p><p><strong>5G_공통 5G NR Reference Signal</strong></p><ul><li>5G 주파수와전파특성</li><li>1. LTE 대비5G 3.5GHz 비교</li></ul><p>가. LTE vs 5G 수신신호세기비교</p><p>LTE 2.6GHz</p><p>5G 3.5GHz</p><p>관계식</p><p>RS</p><p>Output Power</p><p>43 dBm</p><p>49 dBm</p><p>ⓐ</p><p>대역폭</p><p>10 MHz</p><p>100 MHz</p><p>RB 수</p><p>50개</p><p>273개</p><p>ⓑ</p><p>RB 당Subcarrier 수</p><p>12개</p><p>12개</p><p>ⓒ</p><p>Total Subcarrier 수</p><p>600개</p><p>3,276개</p><p>ⓓ=ⓑ*ⓒ</p><p>RS Power</p><p>15.2dBm</p><p>13.8dBm</p><p>ⓔ=ⓐ-10*Log(ⓓ)</p><p>Ant Gain</p><p>16dBi</p><p>24dBi</p><p>ⓕ</p><p>Cable loss</p><ul><li>1dB</li><li></li></ul><p>ⓖ</p><p>RS 당EIRP</p><p>30.2dBm</p><p>37.8dBm</p><p>ⓗ=ⓔ+ⓕ-ⓖ</p><p>LTE 대비Gap</p><p>+7.6dB</p><p>전파특성</p><p>전파감쇄특성</p><ul><li>2.8dB</li></ul><p>ⓘ=20*Log(2.6/3.5)</p><p>전파특성고려한</p><p>LTE 대비Gap</p><p>+4.8dB</p><p>ⓗ+ⓘ</p><p>이론적으로RSRP 수신신호세기비교분석시, 5G 3.5GHz 대역이LTE 2.6GHz 대역보다</p><p>약5 dB 높게분석됨. (Vendor별AMP 및ANT Gain 에따라Gap이다름)</p><ul><li>LTE 2.6G, 5G 3.5G  자유공간전파손실: 20 * Log (3.5/2.6) = 2.58 dB</li></ul><p>나. LTE vs 5G 출력(EIRP)비교_삼성시스템(예)</p><p>5G는분기/ 결합기/ 급전선손실미발생및Beamforming으로인한ANT Gain증가로,</p><p>LTE 대비EIRP 11.5dB 이상높음</p><p><strong>5G_공통 5G 주파수전파특성</strong></p><p>출제분야: 장비운용</p><p>36</p><ul><li>2. 3.5GHz 주파수Clearance</li></ul><p>가. 3.5GHz대역주파수영향요소는①LTE 주파수IM (Intermodulation) 영향, ②1.8GHz LTE</p><p>UL 2ndHarmonic, ③1.8GHz LTE DL 2ndHarmonic,  ④인접대역레이더, ⑤주변국일본TD-</p><p>LTE 동일대역간섭, ⑥주변국5G 동일대역간섭, ⑦생활기기, ⑧UWB(Ultra Wide Band),</p><p>⑨위성대역보호등이있다.</p><ul><li>당사할당대역은①LTE 주파수IM (Intermodulation) 영향, ⑤주변국일본TD-LTE 동일</li></ul><p>대역간섭, ⑨위성대역보호에만영향을받는다.</p><ul><li>LTE 주파수IM의경우LTE/NR 공중선결합시나타나는간섭으로금번5G 할당된3.5GHz</li></ul><p>세밴드중가장IM 영향이낮긴하나결합최소화가권고된다.</p><ul><li>주변국5G 간섭은덕팅현상으로발생가능하며안테나틸트등간섭완화솔루션이필요</li><li>위성대역3.7GHz이상간섭은당사5G 불요파가위성대역에영향을주는것으로, 위성지구국</li></ul><p>의경우안테나이격등을통한보호가필수이다.</p><p>나. 기존LTE 주파수IM 영향</p><ul><li>현재사용중인LTE 주파수와공중선을공유하여결합/활용시전대역에서IM이발생하여</li></ul><p>기존주파수와결합은지양하는것이바람직하다. 금번3.6~3.7GHz 에서는2.6GHz를제외</p><p>하고결합시IM 영향이낮게나타나급전선결합가능성도있으나운용측면에서VOC 발생</p><p>등Side Effect가예상되어결합최소화가권고된다.</p><p><strong>LTE 주파수+ 3.5GHz 결합시→ LTE 주파수IM영향</strong></p><p>출제분야: 장비운용</p><p><strong>5G_공통 5G 주파수전파특성</strong></p><p>37</p><p>다. 일본TD-LTE 간섭</p><ul><li>주영향대역: 3.48 ~ 3.6 GHz</li><li>SKT 대역영향정도: 없음</li><li>측정결과</li><li>1) 부산/ 경남권역방탐시일본TD-LTE 신호는인입되지않음</li><li>2) 일본대마도에서방탐시일본본토직선거리100Km 이상방향에서덕팅(Ducting)에의한</li></ul><p>TD-LTE 신호확인, 추후5G 서비스의대마도확대시국내로불요파유입예상</p><p>☞대마도내TD-LTE 서비스를하지않고일본본토에서도Spot 단위투자가이루어져부산쪽</p><p>인입불요파는없으나일본5G 상용화시덕팅에의한불요파영향은향후추가검토필요</p><p>(5G 대마도확장시영향예상)</p><p>라. 위성대역보호</p><ul><li>3.7~4.2GHz가위성하향링크통신으로할당되어있으며, 위성지구국보호가필수이므로</li></ul><p>SKT대역NR 불요파가위성지구국에간섭영향을주지않아야한다. 당국의경우위성지구국이</p><p>모두읍/면에위치하여NR과공존가능할것으로판단된다.</p><p><strong>5G_공통 5G 주파수전파특성</strong></p><p>38</p><ul><li>Active Antenna 구조</li><li>TRX 수는LNA/PA로구성된Amp 수를의미하고TRX Amp는2~3개의Ant Element와</li></ul><p>연결되어있음</p><p><strong>5G_공통 Active Antenna</strong></p><p>출제분야: 장비운용</p><p>39</p><ul><li>Active Antenna 구조이해</li><li>TRX 당연결된Ant Element 수는전체Angular Coverage를결정: AE 수</li></ul><p>(EX : TRX당AE수↑, Angular Coverage ↓)</p><ul><li>TRX 수는빔의Sharpness(공간을얼마나많이분리할수있는지)를결정: TRX 수</li></ul><p>(EX : TRX수↑, 빔Sharpness 형성자유도증가, 빔정교화)</p><ul><li>Vendor별2가지조합에따라Beamforming 성능이상이하게나타남</li><li>Beamforming 이득결정</li><li>[AE수/ TRX] 는전체Envelope을결정</li><li>[TRX 수] Envelope 안에서beam sharpness를결정</li></ul><p>출제분야: 장비운용</p><p><strong>5G_공통 Active Antenna</strong></p><p>40</p><p><strong>5G_공통 Beamforming/SRS Switching(TAS)</strong></p><ul><li>Beamforming이란?</li></ul><p>다수의안테나를사용Multi 사용자에게적합한Beam 형성</p><p>Beamforming 조건=</p><p>다수의Active Antenna 구성+ Beam의진폭, 위상, Gain 제어필요</p><p>출제분야: 장비운용</p><p>41</p><ul><li>Beamforming 구현방식</li></ul><p>ㅇCSI-RS(PMI,Codebook)기반빔포밍:</p><p>미리정의된빔포밍매트릭스Codebook을갖고최적빔을형성하는방식으로빔의위치가정해져</p><p>있다. 기지국은주기적으로CSI-RS를전송하고단말이PMI기반최적의빔을Report 하면</p><p>기지국이Beam Set중하나를선택하여데이터를전송한다</p><p>ㅇSRS빔포밍:</p><p>TDD시스템의DL/UL 주파수가동일한특성을활용하여단말은SRS를주기적으로전송하고,신호를</p><p>받은기지국이알고리즘연산을통해단말의위치를추정하여빔을형성하는방식.</p><p>이방식은CSI-RS기반빔포밍대비정확한빔형성이가능하고DL의CSI-RS점유가필요없으므로</p><p>주파수자원사용이증가하는장점이있으나,단말이이동할경우빔퐁밍이득이감소할수있는</p><p>단점이있다.</p><p>ㅇTransmite Ant Switching :</p><p>5G에서User Beam 생성하는기술중1가지로기존UE Ant 1기에서송출되던SRS를순차적</p><p>(1st,2nd,3rd,4th)으로4개의Ant로송출하여기존보다</p><p>정확한Beamforming을구현하는기술</p><p><strong>5G_공통 Beamforming/SRS Switching(TAS)</strong></p><p>42</p><p><strong>5G_공통 Beamforming</strong></p><p>출제분야: 장비운용</p><p>43</p><ul><li>이동통신다중안테나및빔포밍기술</li><li>아날로그빔포밍.</li></ul><p>→1개의RF체인과함께다수의위상천이기및신호감쇠기로구성되는송수신시스템구조</p><p>→ 개별안테나마다연결되어있는위상천이기와신호감쇠기의위상및진폭값을각각변화시켜</p><p>빔의방향과모양을형성하는방식</p><p>→ 위상천이기의제한적인해상도특성과비싼부품가격문제로시스템성능과경제성측면에취약</p><p>→ 고용량을위한공간멀티플렉싱(spatial ,multiplexing)전송기법과구조적으로어울리지않은형태</p><p>→ TRX 후단에위상천이기, 신호감쇄기연결구현/ Analog단에서신호의진폭, 위상을변화/</p><p>MU-MIMO 미지원</p><ul><li>디지털빔포밍.</li></ul><p>→ 위상천이기혹은신호감쇠기와같은RF 회로들이사용되지않는다,</p><p>→ RF단에서신호의위상과진폭을변화시키지않으며기저대역(Baseband)에서디지털신호처리를</p><p>통해신호의위상및진폭을변화</p><p>→ RF회로의신호의위상변화에대한오차문제근본해결</p><p>→ 디지털부에서모든안테나로가는각각의신호들에대한위상과진폭을개별적으로세밀하게</p><p>제어/안테나개수와동일한수직빔을동시에만들수있는장점.</p><p>→ 개별안테나마다DAC-저대역필터-믹서로구성되는RF체인요구</p><p>→ Baseband 신호의진폭및위상변화/주파수자원별, 안테나수만큼의빔형성/</p><p>MU-MIMO 지원Cell 용량증대(3.5G)</p><p>출제분야: 장비운용</p><p><strong>5G_공통 Beamforming</strong></p><p>44</p><ul><li>하이브리드빔포밍.</li><li>안테나수보다적은수의RF체인을사용</li><li>기저대역에서디지털빔포머와RF대역에서의아날로그빔포머를동시에활용</li><li>아날로그빔포밍과디지털빔포밍방식을적절하게섞은형태</li><li>디지털빔포밍의시스템부피및전력소모문제를개선하고자RF체인의수를줄이는이점</li><li>위상천이기및감쇠기를사용함애설계관점에서많은제약사항이있음</li><li>Digital 빔포머와Analog 빔포머를동시사용/RF 체인수와동일한Beam 수형성가능/</li></ul><p>Cell 커버리지증대(28G 사용)</p><p><strong>5G_공통 Beamforming</strong></p><p>45</p><ul><li>Beamforming개념및효과</li><li>다수의안테나를활용하여원하는방향으로에너지를집중하여전파를전송하는기술</li><li>전파세기증가: RSRP증가(Edge 구간감소), Modulation 증가</li><li>빔Width 감소: 셀간간섭완화, Layer 동작및MU-MIMO 동작증가</li></ul><p>→ DL 속도증가: SINR 증가및Layer 간구분증가로Modulation, Layer 동작증가</p><p>→ 셀용량증가: MU-MIMO 동작증가</p><p>①SINR 증가②Layer 동작증가</p><ul><li>Beamforming의조건</li><li>다수의Active Antenna 구성+ Beam의진폭, 위상, Gain 필요</li><li>DL Beam 구분: SSB/CSI-RS/PDSCH</li><li>5G 시스템에서는SSB, CSI-RS, PDSCH을각각다른빔형태로전송</li></ul><p>(LTE는CRS 하나의빔만사용)</p><p>출제분야: 장비운용</p><p><strong>5G_공통 Beamforming</strong></p><p>46</p><ul><li>Beamforming방법</li></ul><p>빔패턴특성</p><p>삼성P7</p><p>EKP</p><p>Nokia19BE</p><p><strong>Idle SSB빔</strong></p><p>Wide Beam</p><p>Wide Beam</p><p>Beamforming</p><p>(Beam sweep)</p><p><strong>채널추정 CSI RS 빔</strong></p><p>Beamforming</p><p>Wide Beam</p><p>Beamforming</p><p>(Beam sweep)</p><p><strong>Traffic Data빔PDSCH)</strong></p><p>Beamforming</p><p>Beamforming</p><p>Beamforming</p><ul><li>CSI-RS 기반Data Beamforming 방식</li><li>단말은CSI-RS 를수신하여자신의위치에맞는빔형성을위한피드백전송</li></ul><p>출제분야: 장비운용</p><p><strong>5G_공통 Beamforming</strong></p><p>47</p><ul><li>Vendor별Beam 비교(SSB, CSI-RS, PDSCH)</li><li>1) 삼성P7</li><li>SRS기반단말위치추정→단말위치로Beamformed CSI-RS 전송→PMI Feedback 기반최적Beamforming</li><li>2) EKP</li><li>셀전체영역에Wide한CSI-RS 전송→단말PMI Feedback 기반최적Beamforming</li><li>3) Nokia19B-한SSB 빔에4개의CSI-RS 및PDSCH Gird 가연동됨</li><li>셀전체영역에Beamformed CSI-RS 모두전송→</li></ul><p>단말은자신의위치에서최적인CSI-RS의</p><p>CRI 피드백→</p><p>Beamforming</p><p><strong>5G_공통 Beamforming</strong></p><p>48</p><p>1.개요</p><ul><li>다중송신안테나와다중수신안테나를채택하여송수신데이터효율을향상시킬수있는방법</li><li>송수신양단에2 이상의안테나를사용하여페이딩영향감소,대용량,고속,커버리지증대등의효과를얻는다중안테나기술</li><li>주파수대역폭및송신전력을증가시키지않아도채널용량을크게할수있음</li></ul><p>Data 통신확대등으로인해한계상황에다다른이동통신의전송량한계를극복할수있는차세대기술로관심을모으고있음</p><ul><li>OFDM 기술을접목할시고속의전송률과전송데이터를대용량화할수있는멀티미디어서비스에이용될수있음</li></ul><p>MIMO는대역폭의확장없이물리적인공간(다수안테나를설치할수있는공간)을양보함으로고속의데이터를전송할수있습</p><p>니다.</p><p>그런데동일한송신기에서안테나만달리했다고이러한것들이가능할까요</p><p>이론적으로안테나들을공간적으로반파장이상이격하면물리적으로다른특성을갖고수신할수있습니다.</p><p>특히MIMO에서는물리적채널이산란채널일경우그렇지않은경우보다더성능이좋습니다</p><ul><li>2. 다중안테나기술분류</li></ul><p>2.1 안테나구성에따른분류</p><p>2.1.1 SISO(Single Input Single Output)</p><ul><li>단일송신안테나, 단일수신안테나</li><li>안테나다이버시티및공간다중화효과없음</li></ul><p>2.1.2 SIMO(Single Input Multi Output)</p><ul><li>단일송신안테나, 다중수신안테나</li><li>수신안테나다이버시티효과있음, 공간다중화효과없음</li></ul><p>2.1.3 MISO(Multi Input Single Output)</p><ul><li>다중송신안테나, 단일수신안테나</li><li>수신안테나다이버시티효과없음, 공간다중화효과있음</li></ul><p>2.1.4 MIMO(Multi Input Multi Output)</p><ul><li>다중송신안테나, 다중수신안테나</li><li>안테나다이버시티및공간다중화효과모두가능</li></ul><p>출제분야: 장비운용</p><p><strong>5G_공통 안테나기술</strong></p><p>49</p><p>2.2 Open-loop MIMO 시스템과Closed-loop MIMO 시스템</p><p>2.2.1 Open-loop antenna 시스템</p><ul><li>송신기에서채널정보를알지못함</li><li>다이버시티이득, 다중화이득을얻을수있음</li></ul><p>2.2.2 Closed-loop antenna 시스템</p><ul><li>송신기에서채널정보를알고있음</li><li>수신단에서채널의상태를추정하여, 송신단으로채널정보가중치를귀환시켜, 송신시이가중치를이용하여전송</li><li>개루프방식보다는우수한성능을보이나고속에서지연발생</li><li>빔포밍이득, 다중화이득을얻을수있음</li></ul><p>2.3 사용자수에따른분류</p><p>2.3.1 SU-MIMO(Single User- MIMO)</p><ul><li>단일사용자MIMO</li></ul><p>2.3.2 MU-MIMO(Multi User- MIMO)</p><ul><li>다수사용자MIMO</li><li>3. 다중안테나주요기술</li></ul><p>3.1 공간/안테나다이버시티</p><ul><li>송신, 수신측에복수개의안테나(다중안테나)를설치하여다이버시티효과를얻는방법</li><li>종류: 수신안테나다이버시티, 송신안테나다이버시티</li></ul><p>3.1.1 수신안테나다이버시티(Receive Spatial/Antenna Diversity)</p><ul><li>공간적으로충분히이격된2개이상의안테나를이용하여다이버시티효과을얻는기법</li><li>서로다른무선채널을통과한신호를수신하고이중에페이딩영향이적은것을선택하거나합성수신</li><li>이는전송률을향상시키는방법은아님, 다이버시티이득에의한전송의신뢰도를높이는기술임</li><li>선택형다이버시티(복수개안테나로들어온신호중제일좋은신호를취함), EGC(Equal Gain Combining),</li></ul><p>MRC(Maximal Ratio Combining, IS-95 역방향링크에서사용)</p><p>출제분야: 장비운용</p><p><strong>5G_공통 안테나기술</strong></p><p>50</p><p>3.1.2 송신안테나다이버시티(전송다이버시티, Transmit Spatial/Antenna Diversity)</p><ul><li>송신단에서다중안테나를사용하여수신다이버시티효과를내도록한기술</li><li>같은데이터를다중의송신안테나에전송하면송신다이버시티효과가있어전송의신뢰성이높아지게됨</li><li>동일한심볼을여러송신안테나로전송시다양한경로를통해전송되므로한채널이심한페이딩을겪어</li></ul><p>손실되더라도다른경로심볼이전달될수있으므로무선채널의페이딩을극복할수있음</p><ul><li>수신단에서여러안테나를사용하여다중경로를통해전달된신호들중에페이딩영향이적은것을취사선택하는</li></ul><p>공간다이버시티기법을단말기에적용하기에는크기등한계가있기때문에송신단에서다중안테나를사용함</p><ul><li>하향방향으로많은데이터가보내지는비대칭형전송형태에유리</li><li>알라무티코드(Alamouti code): 가장많이알려진Transmit Spatial Diversity 기술</li><li>Cyclic Delay Diversity(CDD):Transmitter쪽두개이상의안테나에서같은신호를약간의시간차를두고전송을의미</li></ul><p>3.2 스마트안테나(Beam-forming)</p><ul><li>스마트안테나를포함한폐루프빔포밍기술은송신단이수신단에서추정한채널정보를피드백받아이용함</li><li>폐쇄루프빔포밍기술은특정사용자에게RF 에너지가집중되도록각안테나의위상, 진폭의가중값등을조정해주는</li></ul><p>기술로8×8 또는16×16 MIMO 등이사용됨</p><ul><li>기지국의RF 에너지를특정사용자에게만향하도록형성하면특정사용자에게만송신신호전력이집중되므로안테나</li></ul><p>어레이이득을얻을수있어수신신호대잡음비향상, 타사용자에게는간섭이줄게되어셀용량증대와셀커버리지를</p><p>크게할수있음</p><ul><li>빔형성방법에따라스위치빔어레이안테나(Switched Beam Array Antenna), 적응어레이안테나(Adaptive</li></ul><p>Array Antenna)가있음</p><p>가. Switched Beam Array Antenna</p><ul><li>미리정해진유한개의안테나빔패턴중에수신전력에따라최고의성능을줄수있는빔패턴을선택수신</li></ul><p>나. Adaptive Array Antenna</p><ul><li>실시간으로조정되는무한개의빔패턴을적응적으로이용</li></ul><p>출제분야: 장비운용</p><p><strong>5G_공통 안테나기술</strong></p><p>51</p><p>3.3 공간다중화(Spatial Division Multiplexing)</p><ul><li>송신안테나의개수만큼심볼을병렬전송할수있기때문에전력과주파수대역을증가시키지않으면서최대</li></ul><p>송신안테나의개수만큼전송률을증대시킬수있음</p><ul><li>송신안테나의개수만큼데이터전송정보의양을늘릴수있다는장점이있으나채널의페이딩현상에취약하여</li></ul><p>비트오차확률이증가하는문제점이있음</p><ul><li>전송다이버시티나Beam forming은수신신호의품질을좋게만들어주는것이그목적이었으나SDM은수신</li></ul><p>품질은그대로지만전송capacity를늘리는것이목적</p><ul><li>4. 결론</li><li>MIMO 기술이기존시스템에잘적용되기위해서는채널상황에따라적절한변조방식, 전력등과같은무선자원의이용</li></ul><p>시공간부호화에대한연구가있어야함</p><ul><li>MIMO기술은이동통신단말과중계기등에서폭넓게사용할수있는다중안테나기술로무선인터넷의확대등으로</li></ul><p>인해한계상황에다다른이동통신의전송량한계를극복할수있는차세대기술로관심을모으고있음</p><ul><li>MIMO 기술은제한된주파수와전력환경에서고속데이터를전송할수있는핵심기술로4G, WLAN, WiMAX등에폭넓게</li></ul><p>사용될예정임</p><ul><li>향후인접한셀에위치한기지국과상호협력을통해셀경계에위치한사용자에게고품질의서비스를제공하기</li></ul><p>위한Cooperative MIMO 시스템도LTE-Advanced에서적용예정임</p><p><strong>5G_공통 안테나기술</strong></p><p>52</p><p><strong>5G_공통 인빌딩Eng 기준</strong></p><div class="memo-box"><div class="memo-box-title">💡 핵심 포인트</div><div class="memo-text">빔포밍: SINR향상, 간섭저감. Massive MIMO: 64TRX, 4Layer(UE당). AAS 안테나 구조</div></div>'

content:'<p><strong>5G_EKP 5G - 명령어</strong></p><p>출제분야: 장비운용</p><p>155</p><p><strong>5G_EKP 유선망구성도</strong></p><p><strong>5G_EKP Link Failure Alarm</strong></p><ul><li>Link Failure Alarm Case</li><li>1. RiLink가Disable/Enable이반복되는국소(RiPort는정상)</li><li>2. RiLink는정상이나, RiPort에서AAU쪽DATA_1만Disable되는경우</li><li>3. RiLink, RiPort는정상이나AAU가Disable되는경우</li></ul><p><strong>5G_EKP Link Failure Alarm</strong></p><p>출제분야: 장비운용</p><p>158</p><ul><li>1. Link Failure Alarm</li><li>BPU Riport상의Rilink 가disable 되면서Report된다.</li><li>2. Not in operation</li><li>BPU Restart 또는Rilink MO생성/삭제이후Rilink가잠깐동안이라도enable 된적이있을때발생한다.</li><li>알람이발생할수있는직접적인원인(Rilink가지속적으로disable 되었을때, Rilink가30초이내에</li></ul><p>disabled/enabled 를반복할때)</p><ul><li>알람발생시점은500sec 후에발생함.</li><li>3. No signal detected</li><li>이알람은BPU Restart 또는Rilink MO생성/삭제이후Rilink가한번도enable 된적이없을때발생한다.</li><li>알람은Rilink가시작된지3분후에(180초) 발생한다.</li><li>정류기전원에문제가있어서Power off 된후Rilink 가한번도enable 된적이없는경우에도Link Failure</li></ul><p>“No signal detected” 알람이발생한다.</p><ul><li>Optic 케이블에문제가있는경우BPU가Restart 하기전이라면“Not in operation” 알람이발생하며BPU</li></ul><p>가restart 한이후에는“No signal detected“ 알람이발생한다.</p><ul><li>Rilink 가enable 되면“No signal detected” 알람은발생하지않으며그다음부터는“Not in operation”</li></ul><p>알람이발생하게된다.</p><ul><li>4. Power Loss</li><li>Air에서는정류기에서들어오는전압이짧은시간내려갈경우는filtering 을하게되며10ms 이상인</li></ul><p>경우는Power loss 알람을Report 하고Air는Shut Down 된다.</p><ul><li>eCPRI를통하여DUH에Report 되는데링크가불안하거나불량인경우는Power loss 알람은</li></ul><p>report 되지못하며대신DUH에서Link Failure 알람이발생한다.</p><p><strong>5G_EKP Link Failure Alarm</strong></p><p>출제분야: 장비운용</p><p>159</p><p><strong>5G_EKP Layer Splitter Hub</strong></p><p><strong>5G_EKP Layer Splitter Hub</strong></p><p>출제분야: 장비운용</p><p>161</p><p>Delay 설정셋팅: 전진배치/후진배치관계없이LSH 시스템delay(10us), PRU당시스템delay(5us),</p><p>Total delay 100us</p><ul><li>전진배치: (DUH 집중국등~ LSH+PRU 동일장소) : 예들들어서LSH 에PRU가</li></ul><p>Cascade로2식이있다면LSH 시스템delay(10us) + 2 PRU 시스템delay(10us)+</p><p>LSH~PRU~PRU간의광delay를생각해서셋팅</p><p>이경우PRU Cascade가한건물에있을경우최소20us 이상delay를설정</p><ul><li>후진배치(DUH+LSH 동일장소~ PRU 다른장소) : LSH와PRU 사이의거리,</li></ul><p>특히5G PON의경우Long Path를고려, 1km당5us,+ LSH 시스템delay(10us),</p><p>PRU당시스템delay(5us)를고려하여LSH에delay 설정</p><p>예를들어DUH+LSH 동일장소~ PRU 다른장소가6km이라면LSH 시스템</p><p>delay(10us) + 6km에대한광delay (30us) + 2 PRU 시스템delay(10us)+</p><p>LSH~PRU~PRU간의광delay = 최소50us 보다는크게delay를설정</p><p>Delay 변경시원격으로설정여부: 가능</p><ul><li>기존ENM을통해Topology Browser로LSH 원격접속후delay 설정변경</li></ul><p><strong>5G_EKP Layer Splitter Hub</strong></p><p>출제분야: 장비운용</p><p>162</p><p><strong>5G_EKP Layer Splitter Hub</strong></p><p>출제분야: 장비운용</p><p>163</p><p>Product</p><p>Vertical</p><p>Beamwidth</p><p>Horizontal</p><p>Beamwidth</p><p>Digital Tilt</p><p>Vertical</p><p>Beamwidth</p><p>Horizontal</p><p>Beamwidth</p><p>Digital Tilt</p><p>Vertical</p><p>Beamwidth</p><p>Horizontal</p><p>Beamwidth</p><p>Digital Tilt</p><p>수직</p><p>수평</p><p>수직</p><p>수평</p><p>수직</p><p>수평</p><p>수직</p><p>수평</p><p>AIR 3239 B78C</p><p>10±2</p><p>65±5</p><p>1 ~ 9</p><p>19±3</p><p>65±5</p><p>Fixed 6</p><p>19±3</p><p>25±3</p><p>Fixed 6</p><p>9</p><p>12</p><p>9</p><p>21</p><p>9</p><p>12</p><p>수직</p><p>수평</p><p>수직</p><p>수평</p><p>수직</p><p>수평</p><p>AIR 3227 B43</p><p>8.5±1</p><p>65±5</p><p>3 ~ 9</p><p>17±2</p><p>65±5</p><p>Fixed 6</p><p>8.5</p><p>12.5</p><p>8.5</p><p>22</p><p>8.5</p><p>12.5</p><p>수직</p><p>수평</p><p>수직</p><p>수평</p><p>수직</p><p>수평</p><p>AIR 6488 B43</p><p>9±1</p><p>62.5±5</p><ul><li>8 ~ +8</li></ul><p>28±3</p><p>62.5±5</p><p>Fixed 3</p><p>28±3</p><p>23.5±3</p><p>Fixed 3</p><p>수직</p><p>수평</p><p>수직</p><p>수평</p><p>수직</p><p>수평</p><p>AIR 6419 B78Y</p><p>6.5±1</p><p>65±5</p><ul><li>3 ~ +11</li></ul><p>26±2</p><p>65±5</p><p>Fixed 6</p><p>26±3</p><p>20±2</p><p>Fixed 6</p><p>6.5</p><p>12</p><p>6.5</p><p>19.5</p><p>6.5</p><p>12.5</p><p>H0 V19도</p><p>H0V3도 방</p><p>향</p><p>H55 V3도</p><p>H0 V18도</p><p>25</p><p>110</p><p>H0V6도 방</p><p>향</p><p>H55 V6도</p><p>3dB 빔폭</p><p>H0V6도 방</p><p>향</p><p>H55 V6도</p><p>H0 V13도~</p><p>16도</p><p>장비타입</p><p>Common_Beam</p><p>Traffic Beam Width(개별빔)</p><p>Traffic</p><p> title:'LTE 아키텍처/EPC 구성',
content:'<ul><li>LTE 망의Architecture</li></ul><p>MME</p><p>P-GW</p><p>S-GW</p><p>eNB</p><p>eNB</p><p>eNB</p><p>eNB</p><p>EPC</p><p>X2</p><p>S1</p><p>하나로구현가능</p><p>SAE</p><p>System Architecture Evolution</p><p>Long-Term Evolution</p><p>LTE</p><p>EPC: Evolved Packet Core</p><p>EPC는eNB 와PDN 사이에있는시스템으로MME, S-GW, P-GW로구성된다.</p><p>MME는eNB와NAS signaling 프로토콜을통해control 메시지를처리하며, UE에대한이동성관리,</p><p>tracking area 리스트관리, bearer 및세션관리등의control plane을담당한다. S-GW는2G/3G 액세스</p><p>시스템과LTE 시스템간user plane의anchor 역할을수행하며, downlink/uplink 데이터의패킷전송</p><p>계층을관리한다. P-GW는UE에IP Address 를할당하며, LTE 시스템과non-3GPP 액세스시스템간의</p><p>이동성을위한anchor 역할및서비스레벨에따른과금과전송률을관리한다.</p><p>출제분야: 장비운용</p><p><strong>LTE_공통 LTE 망의Architecture_1</strong></p><p><strong>LTE_공통 LTE 망의Architecture_1</strong></p><p>4</p><ul><li>P-GW (Packet Data Network Gateway)</li><li>S-GW에서받은User Traffic을Internet 망으로연동</li><li>IMS, 인터넷등PDN(Packet Data Network)에대한G/W이며Non-3GPP망에대한이동성을관리함</li><li>정책에따른과금을수행하며유해Packet 차단등을담당함</li><li>기존GGSN과유사한기능을수행함</li><li>DL rate enforcement based on AMBR, MBR</li><li>UL/DL transport level packet marking (e.g. DSCP based on QCI)</li><li>Policy Enforcement</li><li>Service level charging, OFCS 연동, gate control, rate enforcement</li><li>Per-user based packet filtering</li><li>Lawful Interception</li><li>UE IP address 할당</li><li>DHCPv4, v6 (server, client)</li><li>PDP type PPP</li><li>UL/DL bearer binding 및단말의UL bearer binding 확인</li><li>Packet screening</li><li>UL/DL bearer binding</li><li>UL bearer binding verification</li><li>Neighbor Discovery for IPv6</li></ul><p>출제분야: 장비운용</p><p><strong>LTE_공통 LTE 망의Architecture_1</strong></p><p><strong>LTE_공통 LTE 망의Architecture_2</strong></p><p>6</p><ul><li>LTE 단말초기인증시스템</li><li>AUC : Authentication Center 불법사용자를SKT망에서차단하여우리무선자원을이용하지</li></ul><p>못하게하는것</p><ul><li>EIR : 해당IMEI에대한상태정보를데이터베이스에질의한후그결과를요청한MSC 또는SGSN</li></ul><p>에게반송한다. IMEI에대한상태정보를전달받은MSC 또는SGSN은그결과가정상적인</p><p>경우(화이트목록) 해당호를계속진행하고, 비정상적인경우(블랙목록: 도난단말기) 호를</p><p>종료한다. 이처럼EIR은도난또는부적절한이동통신단말기를네트웍상에서검출하고그</p><p>사용을제한하는목적으로사용</p><ul><li>HLR(Home Location Register)</li></ul><p>: 이동통신가입자정보(위치정보, 인증정보, 서비스정보, 권한및부가정보등)를실시간으로</p><p>관리하는이동통신망의기본시스템이다. MSC/VLR, AC, SMSC, Feature Server와의연동을통해</p><p>발/착신, 인증, 단문메시지, Packet 전송, 위치정보및지능망서비스를제공</p><p>출제분야: 장비운용</p><p><strong>LTE_공통 LTE 망의Architecture_3</strong></p><ul><li>Control Plane : 제어정보의전송을담당하고있으며, 단말과MME 사이에서단말인증, 보안</li></ul><p>제어, IDLE 모드단말의페이징및이동관리를수행한다.</p><ul><li>User Plane : 상위계층에서전달받은사용자데이터(IP Packet) 등의전송을담당하며UE</li></ul><p>(User Equipment) 에서P-GW 사이의터널링역할을한다</p><ul><li>Tunneling : 하위층통신규약의패킷을상위층으로캡슐화하는것이며통신망상의두점</li></ul><p>간에통신이되게한것</p><p>Circuit망없이Packet망으로구성</p><p>전송망과서비스측면ALL-IP 네트웍구성</p><p>Control plane과User Plane의분리</p><p>C/U plane의독립적인용량설계가능</p><p>7</p><p>구분</p><p>내</p><p>용</p><p>MIB</p><p>가장중요한Information Block으로매40ms마다BCH(Broadcast Channel)을통해전송</p><p>단말은SCH(Synchronization Channel)을decode하기위해MIB을획득</p><p>MIB에는DL system bandwidth, SFN(System Frame Number)을포함</p><p>SIB1</p><p>Cell access 관련정보(PLMN identity, tracking area code, cell identity..), cell selection 관련정보</p><p>SIB2</p><p>무선자원구성정보</p><p>(RACH, BCCH, PCCH, PRACH, PDSCH, PUSCH, PUCCH, SRS, 상향링크전력제어구성정보)</p><p>SIB3</p><p>Intra, inter frequency 및이기종시스템과의핸드오버를위한일반적인핸드오버파라미터</p><p>SIB4</p><p>LTE 망내에서의intra-frequency 핸드오버를위한인접셀정보</p><p>SIB5</p><p>LTE 망내에서의Inter-frequency 핸드오버를위한인접셀정보</p><p>SIB6</p><p>UTRAN(WCDMA)으로의핸드오버관련정보</p><p>SIB7</p><p>GERAN(GSM,EDGE)으로의핸드오버관련정보</p><p>SIB8</p><p>Cdma2000 으로의핸드오버관련정보</p><p>SIB9</p><p>Home eNodeB identifer</p><p>ㅇ가장중요한Information Block으로매40ms마다BCH(Broadcast Channel)을통해</p><p>전송된다. 첫번째MIB의전송은SFN mod 4=0일때sub-frame #0에전송된다.</p><p>단말은SCH(Synchronization Channel)을decode하기위해MIB을획득한다.</p><p>MIB에는DL system, bandwidth, SFN(System Frame Number)을포함</p><p>ㅇDetail Message</p><ul><li>MasterlnformationBlock</li></ul><p>①</p><p>②</p><p>③</p><p>①메시지명: MasterlnformationBlock</p><p>②CELL_ID : ServiceCell의PCI 정보(기지국섹터정보)</p><p>③n75 1RB (Resource Block)</p><p>출제분야: 장비운용</p><p><strong>LTE_공통 Call Flow message</strong></p><p>8</p><ul><li>Syste p>nCS_AN = 0</p><p>n1PUCCH_AN = 40</p><p>soundingRS_UL_ConfigCommon</p><p>release</p><p>uplinkPowerControlCommon</p><p>p0_NominalPUSCH = -80</p><p>alpha = al08</p><p>p0_NominalPUCCH = -106</p><p>deltaFList_PUCCH</p><p>deltaF_PUCCH_Format1 = deltaF0</p><p>deltaF_PUCCH_Format1b = deltaF3</p><p>deltaF_PUCCH_Format2 = deltaF0</p><p>deltaF_PUCCH_Format2a = deltaF0</p><p>deltaF_PUCCH_Format2b = deltaF0</p><p>deltaPreambleMsg3 = 6</p><p>ul_CyclicPrefixLength = len1</p><p>uplinkPowerControlCommon_v1020</p><p>deltaF_PUCCH_Format3_r10 = deltaF0</p><p>deltaF_PUCCH_Format1bCS_r10 = deltaF2</p><p>pusch_ConfigCommon_v1270</p><p>enable64QAM_v1270 = true</p><p>ue_TimersAndConstants</p><p>t300 = ms1000</p><p>t301 = ms1000</p><p>t310 = ms2000</p><p>n310 = n20</p><p>t311 = ms5000</p><p>n311 = n1</p><p>freqInfo</p><p>additionalSpectrumEmission = 1</p><p>timeAlignmentTimerCommon = infinity</p><p>voiceServiceCauseIndication_r12 = true</p><p>plmn_InfoList_r15[0]</p><p>upperLayerIndication_r15 = true</p><p>ㅇPreamble 개수총64개중에60개는Setup용(Random Access용), 4개는H/O 용</p><p>ㅇRandom Access시Power Ramping Step 4dB</p><p>ㅇRandom Access시Initial Power, Target RCV Power -108dB부터시도</p><p>ㅇRandom Access 최대시도수10회</p><p>ㅇreferenceSignalPower = 18</p><p>ㅇue Timer 정보</p><p>출제분야: 장비운용</p><p><strong>LTE_공통 Call Flow message</strong></p><p>10</p><p>출제분야: 장비운용</p><ul><li>System Information – SIB3</li></ul><p>ㅇ정의: Mobility 기능관련정보로써, Idle 상태에서의Cell Reselection</p><p>및Inter RAT Reselection을위한Parameter 값들이전달됨</p><p>ㅇDetail Message</p><p>sib_TypeAndInfo[0]</p><p>sib3</p><p>cellReselectionInfoCommon</p><p>q_Hyst = dB0</p><p>cellReselectionServingFreqInfo</p><p>s_NonIntraSearch = 31</p><p>threshServingLow = 13</p><p>cellReselectionPriority = 5</p><p>intraFreqCellReselectionInfo</p><p>q_RxLevMin = -64</p><p>s_IntraSearch = 31</p><p>allowedMeasBandwidth = mbw6</p><p>presenceAntennaPort1 = FALSE</p><p>neighCellConfig 10</p><p>t_ReselectionEUTRA = 1</p><p>t_ReselectionEUTRA_SF</p><p>sf_Medium = oDot5</p><p>sf_High = oDot5</p><p>①Reselection의히스테리시스값(핑퐁최소화할때사용)</p><p>②LTE~W간, interFreq Reselection을위한Neighbor measure 조건</p><p>threshold LTE RSRP &lt; sNonIntraseach+ qRxLevMin, (31*2)-128= -66</p><p>③Inter frequency, Inter –RAT Reselection을위한Offset값</p><p>(13*2)-128 = -102</p><p>④셀재선택시우선순위를의미함(Serving Cell의Priority)</p><p>⑤LTE 서비스를위한Minimum Level</p><p>⑥Intra Freq Reselection을위한Neighbor measure조건</p><p>LTE RSRP &lt; sIntrasearch + qrxlevmin = (31*2) – 128 = -66</p><p>②</p><p>③</p><p>④</p><p>⑤</p><p>①</p><p>⑥</p><p><strong>LTE_공통 Call Flow message</strong></p><p>11</p><p>출제분야: 장비운용</p><ul><li>System Information – SIB5</li></ul><p>ㅇ정의: Inter Freq. Reselection을위한Parameter 값정보</p><p>ㅇDetail Message</p><p><strong>LTE_공통 Call Flow message</strong></p><p>12</p><p><strong>LTE_공통 Call Flow_Cell Selection &amp; Reselection</strong></p><p>출제분야: 장비운용</p><p>Cell Selection</p><p>LTE단말이초기Power on, 비행기모드전환후원복, LTE No-Service지역에서In-Service</p><p>지역으로진입시단말은먼저초기동기설정실행후PLMN을선택하고, 선택된PLMN내에서</p><p>Cell selection 기준으로Best Cell을선택하여위치등록을실행</p><ul><li>PLMN : Public Land Mobile Network(MCC+MNC)</li></ul><p>MCC : Mobile Country Code (한국: 450)</p><p>MNC : Mobile Network Code (SKT : 05)</p><p>Cell Reselection (Intra-LTE간)</p><p>LTE단말이Cell Selection 후에Cell reselection 기준에의해주기적으로better cell을탐색하여</p><p>better cell을선택(SIB3번)</p><p>Cell Reselection (Inter-LTE간)</p><p>LTE단말이Cell Selection 후에Cell reselection 기준에의해Inter frequency Reselection수행</p><p>Inter frequency Reselection을위해서는‘IRFIM’ object 생성필요(SIB5번)</p><ul><li>LTE 초기동기절차</li></ul><p>13</p><p><strong>LTE_공통 무선환경reselection 동작</strong></p><ul><li>Serving Cell Priority 가inter Frequency Cell 보다높을경우</li></ul><p>ㅇServing 셀이일정조건보다작고, Target Cell 이일정조건보다좋아야한다.</p><p>ㅇServing, Target을모두만족시켜야하는And조건</p><p>ㅇTarget 값비교시THRESH_XLOW 값사용</p><ul><li>Serving Cell Priority 가inter Frequency Cell 보다낮을경우</li></ul><p>ㅇTarget 값만만족시키면됨</p><p>ㅇTarget 값비교시THRESH_ XHIGH 값사용</p><ul><li>Priority가높은셀로천이할때는Serving조건은안보고Target조건만확인</li></ul><p>(ThreshXhigh + qRxLevMin(t))</p><ul><li>Priority가낮은셀로천이할때는Serving조건ThreshServingLow + qRxLevMin(s) 과</li></ul><p>Target조건ThreshXLow + qRxLevMin(t)확인한다.</p><p>출제분야: 장비운용</p><p><strong>LTE_공통 IMLB &amp; SPID</strong></p><p>출제분야: 장비운용</p><p>15</p><p>출제분야: 장비운용</p><ul><li>Handover는방식에따라여러Type이존재</li></ul><p>구분</p><p>SKT</p><p>사용유무</p><p>동작설명</p><p>비고</p><p>Event A1</p><p>미사용</p><p>Serving이특정값(absolut threshold) 이상이되었을경우</p><p>Event A2</p><p>사용</p><p>Serving이특정값(absolut threshold) 이하가되었을경우</p><p>RSRP 기준/</p><p>BandWith</p><p>이기종</p><p>Event A3</p><p>사용</p><p>Neighbor가Serving보다특정값(offset) 이상이되었을경우</p><p>RSRQ 기준/</p><p>Normal</p><p>EMS</p><p>Event A4</p><p>미사용</p><p>Neighbor가특정값(absolute threshold) 이상이되었을경우</p><p>Event A5</p><p>사용</p><p>Serving이특정값1(absolute threshold1) 이하가되고, Neighbor</p><p>가다른특정값2(absolute threshold2) 이상이되었을경우</p><p>HD-Voice</p><p>Event B1</p><p>사용</p><p>Non LTE Neighbor가특정값(absolute threshold)이상이</p><p>되었을경우</p><p>5G Add</p><p>Event B2</p><p>미사용</p><p>Serving이특정값1(absolute threshold1) 이하가되고, non LTE</p><p>Neighbor가다른특정값2(absolute threshold2) 이상이되었을</p><p>경우</p><p>RSRP 기준/</p><p>이기종</p><p>Event A6</p><p>M:N CA</p><p>M:N CA 상용화시Scell Change 사용</p><p><strong>LTE_공통 Handover</strong></p><p>16</p><p><strong>LTE_공통 Handover</strong></p><p>17</p><p>출제분야: 장비운용</p><p><strong>LTE_공통 Tracking Area Update</strong></p><p>18</p><p>나. LTE망eNB기능</p><ul><li>LTE Air 규격에따라UE와무선상으로접속및호처리담당</li><li>무선신호의송수신기능</li><li>패킷트래픽에대한변복조기능</li><li>무선자원스케줄링기능</li><li>HARQ (Hybrid Automatic Repeat Request)/ARQ(Automatic Repeat Request) 처리기능</li><li>패킷헤더압축의PDCP(Packet Data Convergence Protocol) 기능</li><li>무선자원제어기능</li><li>EPC와연동하여핸드오버를수행</li></ul><p>가. LTE망Procotol Stack</p><ul><li>MAC</li><li>물리채널들과전송채널들간의매핑을담당하고, 하나또는다른논리채널로부터전송채널상의물리</li></ul><p>계층으로전달되는전송블록(TB)으로의MAC SDU의멀티플렉싱, 하나또는다른논리장치로부터의</p><p>MAC SDU들의다중화스케줄링정보보고, ​HARQ를통한에러정정, 자원분배(RB 할당)동적스케쥴링에</p><p>의한UE들간의우선순위처리, 하나의UE의논리채널들간의우선순위처리, 논리채널우선순위화</p><p>(logical channel prioritization)</p><ul><li>PDCP</li><li>IP 데이터의헤더압축및압축해제, 데이터전송(사용자평면또는제어평면), PDCP 시퀀스번호유지</li></ul><p>(SN), 하위계층의재구성시상위계층PDU의순차전달, 복제RLC AM에매핑된무선베어러에대한하위</p><p>계층재구성시하위계층SDU 제거, 사용자플레인데이터및제어플레인데이터의암호화및해독, 제어</p><p>플레인데이터의무결성보호및무결성검증, 타이머기반폐기, 중복폐기, PDCP 논리채널의DCCH 및</p><p>DTCH 유형에매핑된SRB 및DRB에사용</p><ul><li>RLC</li><li>Transparent Mode (TM), Unacknowledged Mode (UM) 및Acknowledged Mode (AM)의세가지작동</li></ul><p>모드로작동합니다. RLC 계층은상위계층PDU의전송, ARQ (AM 데이터전송에만해당)를통한오류수정,</p><p>RLC SDU의연결, 세그먼트화및재구성을담당합니다(UM 및AM 데이터전송에만해당)</p><ul><li>RRC</li><li>주요서비스및기능은비접속계층(NAS)에관련된시스템정보의브로드캐스트, 액세스계층(AS)과</li></ul><p>관련된시스템정보의브로드캐스트, 페이징, 설정, 유지보수및RRC 연결해제사이의UE 및E-UTRAN,</p><p>포인트- 투- 포인트무선베어러의키관리, 설정, 구성, 유지및릴리스를포함하는보안기능. 이동성관리</p><p>출제분야: 장비운용</p><p><strong>LTE_공통 LTE망Procotol Stack</strong></p><div class="memo-box"><div class="memo-box-title">💡 핵심 포인트</div><div class="memo-text">Attach 절차: UE→eNB→MME→HSS→SGW→PGW. X2 핸드오버 vs S1 핸드오버</div></div>'

title:'FDD Frame 구조/자원할당',
content:'<p>출제분야: 장비운용</p><p><strong>LTE_공통 FDD Frame Structure</strong></p><ul><li>LTE FDD Frame Structure</li><li>1Slot : (시간축) 7개의Symbol로이루어진0.5ms 주기를가지는단위</li></ul><p>→1 slot = 7 OFDM Symbols = 0.5 ms</p><ul><li></li></ul><p>Sub-Frame : (시간축)2개의Slot으로이루어진1ms 주기를가지는단위</p><p>→1 sub-frame = 2 slots = 1 ms( =1 TTI)</p><ul><li>Radio Frame : (시간축) 10개의Sub-Frame으로이루어진10 ms</li></ul><p>→1 Radio frame = 10 sub-frames = 10 ms</p><ul><li>1Sub-Carrier : (주파수축)15KHz의주파수대역을가진최소단위</li></ul><p>→1 sub-carrier = 15 kHz</p><ul><li>1RB : (시간/주파수축)12개Sub-Carrier(180KHz)</li></ul><p>→1 RB = 12 Sub Carrier = 180 kHz</p><ul><li>50 (RB) X 12(SubCarrier) X 7(Symbol) X 2(Slot) X 6 (64QAM) X 2 (MIMO)  =</li></ul><p>100800 Bit</p><ul><li>100800*0.75(데이터유효코딩율) = 75.6Mbps</li><li>LTE Throughput 및Modulation</li><li>LTE Throughput [ 20MHz, 256QAM, 4*4MIMO ]</li><li>20MHz Res per sub-frame</li><li>RE = 12subcarriers X 7OFDMA Symbols X 100RB X 2slots = 16800REs/sub-frame</li><li>Modulation : 16800REs/sub-frameX8bits=134400bits</li><li>bps로변환: 134400bits /1ms =134400000=134.4Mbps</li><li>MIMO :134.4Mbps X 4 =537.6Mbps</li><li>25퍼센트overhead : Control Channel (537.6Mbpsx0.75=403.2Mbps)</li></ul><p><strong>LTE_공통 LTE 자원할당Scheduling</strong></p><p>LTE Scheduling</p><p>21</p><ul><li>Downlink Scheduling</li><li>기지국이단말로부터보고받은CQI(Channel Quality Indicator) 정보를기반으로</li></ul><p>MCS(Modulation and Coding Scheme)를결정하고자원을할당</p><ul><li>Uplink Scheduling</li><li>단말이보낼데이터가있다는**SR(Scheduling Request)**이나**BSR(Buffer Status</li></ul><p>Report)**을기지국에보내면, 기지국이상향링크자원(UL Grant)을허락해주는방식</p><ul><li>​Pre-scheduling</li><li>단말의요청이오기전에기지국이미리자원을할당하여지연시간(Latency)을최소화</li></ul><p>하는기법해당Subframe(TTI)에스케쥴링을고려할UE(Time domain 스케쥴링</p><p>candidate set) 산출</p><ul><li>UE에할당될수있는Available PRB/RBG을산출</li><li>DL MAC에서제공되는Buffer Fill 레벨을고려하여개개UE의데이터전송이</li></ul><p>available한지결정</p><ul><li>Cross-Carrier Scheduling</li><li>Carrier Aggregation(주파수결합) 환경에서하나의PCell(Primary Cell)이다른</li></ul><p>SCell(Secondary Cell)의자원할당정보까지제어채널로알려주는방식</p><p>출제분야: 장비운용</p><p><strong>LTE_공통 LTE 자원할당Scheduling</strong></p><p>22</p><p>출제분야: 장비운용</p><p>ㅇ1.8G에가장큰효과가크며그이유는MC-PUSCH 이다.</p><p>ㅇ3GPP Release10 부터불연속한PUSCH 전송이규격적으로가능해졌고</p><p>이를UL resource allocation type-1 (또는Multi-cluster PUSCH) 이라한다.</p><p>구별을위하여, 기존의연속한PUSCH 전송을UL resource allocation type-0 라한다.</p><p>UL 대역이분할되었을경우, 불연속한전송을통하여UE의UL throughput을향상시킬</p><p>수있다. 특히, 공군주파수가운영되는1.8GHz 대역에서유용하다.</p><p><strong>LTE_공통 UP Link 전송속도</strong></p><p>23</p><div class="memo-box"><div class="memo-box-title">💡 핵심 포인트</div><div class="memo-text">10ms Frame → 10개 Subframe → 각 2개 Slot → 6/7개 OFDM Symbol</div></div>'

title:'CA(반송파집성)/MIMO/TM',
content:'<ul><li>DL CA 가설정되어있고, UL CA 기능을지원할수있는UE 에대해서DL SCell 에서UL SCell 을</li></ul><p>선택할수있다.</p><ul><li>eNB 는CA Call Control 기능을수행하여DL &amp; UL CA Suppported Band Combination 기능이</li></ul><p>있는CA UE 에대하여DL CA SCell조합을결정, 선정된DL SCell 중에서eNB 는아래의기준을</p><p>사용하여UL SCell 선정한다.</p><ul><li>PCell 과의Co-located 구성</li><li>eNB 의Supported UL Band Combination</li><li>UL CA 운용시SCell의Random access는규격상dedicated preamble을통해서만동작가능Pcell</li></ul><p>에속한UE들의dedicated preamble 자원과의collision을회피하기위하여별도로Scell</p><p>activation을위한dedicated preamble 자원을설정</p><ul><li>SCell activation</li><li>아래조건2가지중한가지라도만족하는지여부확인하고, 한가지조건이라도만족하면SCell</li></ul><p>activation</p><ul><li>조건1: DL 데이터양이일정수준(= avgBoThreAct) 이상인경우</li><li>조건2: BSR 기준UL 데이터양이일정수준(= UlBoThreAct) 이상인경우</li><li>SCell deactivation</li><li>아래조건2가지중한가지라도만족하는지여부확인하고, 한가지조건이라도만족하면SCell</li></ul><p>deactivation</p><ul><li>조건1: SCell로DL 및UL 데이터가없어서deactivation timer가0이되는경우</li><li>조건2: SCell에서DL OOS(Out-Of-Sync.)가발생할정도의환경인경우</li></ul><p><strong>LTE_공통 Carrier Aggrigation</strong></p><p>24</p><p>출제분야: 장비운용</p><p><strong>LTE_공통 Transmission Mode</strong></p><p>전송모드</p><p>MIMO Scheme MIMO 방식</p><p>설명</p><p>TM1</p><p>single antenna transmission</p><p>TM 1은SISO 구성또는SIMO 구성일수있으며, 여기서사용자장비는MRC, maximum ratio combining 또</p><p>는유사한기술과같은알고리즘을사용하여신호품질을향상시키기위해다중안테나를가질수있다.</p><p>TM2</p><p>transmit diversity</p><p>TM 2는모든데이터스트림이동일한정보를전송하는rank 1 기술로링크에추가이득을제공하지만데이터</p><p>속도를증가시키지않는transmit diversity 이다.</p><p>안테나는낮은공간상관성을가져야하며, 이는교차편파안테나또는적어도5 ~ 6 파장의안테나간거리로</p><p>달성할수있다. 그리고TM 2는정밀한PMI 피드백을필요로하지않으므로빠르게움직이는사용자를지원할</p><p>수있다.</p><p>TM3</p><p>open loop codebook based pre-coding</p><p>TM 3은각각의전송계층에서상이한정보가전송되는2 개의전송안테나를갖는공간다중화기술이다.</p><p>TM 3은CDD 라불리는기술을사용하는데, (약자로Cyclic Delay Diversity) tight close look PMI 피드백을제공</p><p>하는대신, pre-coder matrices의미리정의된코드북은각각의레이어가유사한평균채널품질을갖도록설</p><p>계된레이어순열과함께주파수대역에걸쳐순환된다.</p><p>closed loop feedback이필요없기때문에이모드는빠르게움직이는사용자를지원하는데에도적합하다.</p><p>TM4</p><p>closed loop codebook based pre-codin</p><p>g</p><p>TM 4는서로다른정보가각전송계층에서전송되는최대4 개의전송안테나를사용하는공간다중기술이다.</p><p>closed loop PMI 피드백은필요한pre-coding  행렬을지정하는데사용되므로이모델은느린이동사용자에</p><p>게만사용된다.</p><p>안테나는일반적으로직교편파안테나또는적어도5 ~ 6 파장의안테나간거리로달성되는낮은공간적상</p><p>관관계가있어야한다.</p><p>TM5</p><p>Multiuser MIMO version of transmissio</p><p>n mode-4</p><p>TM 5는동일한주파수자원을사용하여동시에여러사용자에게서비스하며사용자는각사용자에게보내지</p><p>는빔에의해공간영역에서분리된다.</p><p>사용자수는공간계층의수에의해제한되며각사용자는전용공간계층을가져야한다.</p><p>이모드에서사용되는송신안테나는선형안테나어레이이다.</p><p>TM6</p><p>single layer special case of closed loop</p><p>codebook based pre-coding</p><p>TM 6은단일층closed loop 공간멀티플렉싱기술로간주될수있다.</p><p>이는단일층, open loop 송transmit diversity 기법인송신모드번호2에비해1-2dB의개선을제공하는빔</p><p>형성효과를생성한다.</p><p>TM 6은폐쇄루프기술이기때문에UE로부터의긴밀한피드백을필요로하므로느린이동또는정지된사용</p><p>자에게만적합하다.</p><p>TM7</p><p>release 8 non codebook based pre-cod</p><p>ing supporting only single layer, based</p><p>on beamforming</p><p>TM 7은선형안테나어레이를사용하여빔포밍을기반으로하는rank 1 기술로이모드는각서비스사용자의</p><p>방향으로전송전력을집중시켜셀범위를확장한다.  전력은수신측에서건설적으로신호합산을하기위해</p><p>다른안테나로전송된신호의위상조정에의해집중된다.</p><p>빔형성이득은변조및다중경로심각도에따라10xlog 안테나수와5dB까지될수있는다이버시티이득인</p><p>어레이이득의두부분으로구성된다.</p><p>TM 7은사용자장비로부터의긴밀한피드백이요구되지않는open loop 기법이므로빠른이동가입자에게적</p><p>합하다.</p><p>TM8</p><p>release 9 non codebook based pre-cod</p><p>ing supporting upto 2 layers.</p><p>2 레이어까지지원하는비코드북기반pre-coding</p><p>TM9</p><p>release 10 non codebook based pre-co</p><p>ding supporting upto 8 layers 8</p><p>TM-9는기지국이이동장치를구별하고다른복조참조신호(DM-RS)를커버리지영역내에위치하는각각의</p><p>이동장치로송신하게한다.</p><p>또한각기지국은고유한채널정보참조신호(CSI-RS)를사용하여장치와통신하며새로운TM-9는오버헤</p><p>드를최소화하면서네트워크성능과성능을향상시킨다.</p><p>TM9는높은스펙트럼효율(고차원MIMO 사용)과셀에지데이터전송률, 커버리지및간섭관리(빔포밍사</p><p>용)의장점을결합하도록설계되었다.  단일사용자MIMO (SU-MIMO)와다중사용자MIMO (MU-MIMO)의향</p><p>상된버전간의유연하고동적인전환도제공된다.</p><p>SK 텔레콤은에릭슨(Ericsson)과의제휴를통해전송모드9 (TM-9)라는핵심LTE-Advanced 기술을성공적으</p><p>로시연했다.  TM-9는모바일장치와기지국간의전송방식을정의한다.  2011 년6 월에3GPP에의해새로운</p><p>LTE-A 규격으로채택되었으며이미2012 년에다른LTE-Advanced 기능인CA 및eICIC 기술을시연했다.</p><p>TM-9의개발및시연은SK 텔레콤과에릭슨간의글로벌R &amp; D 파트너십으로2012 년10 월에시작되었다.</p><p>시연의결과에따르면TM-9는셀간간섭영역에서모바일장치의데이터전송률을10-15 % 증가시킬수있었다.</p><p>모바일네트워크환경에서, 기지국과인접한다수의기지국에의해커버되는중첩영역사이의경계영역에서</p><p>데이터전송속도가감소한다.  따라서통신회사들은기지국간간섭을최소화하고네트워크안정성을향상시</p><p>키기위해다양한기술을개발하고있다.</p><p>SK 텔레콤은데이터전송속도와용량이더욱중요해지는차세대LTE-A 환경에대응해기지국간간섭을최</p><p>소화하면서기지국용량을확장하여최적의네트워크환경을구축하기위해TM-9를개발했다고밝혔다</p><p><strong>LTE_공통 MIMO-SM Vs Diversity</strong></p><p>26</p><p><strong>LTE_공통 MIMO</strong></p><p>AMS (Adaptive MIMO Switching)</p><p>STC &amp; SM-MIMO</p><p>출제분야: 장비운용</p><p>27</p><ul><li>1. SFBC(Space Frequency Block Coding)-Downlink</li></ul><p>ㅇ링크상의신뢰성증대(Peak data rate 의증가효과는없음)</p><p>ㅇSTBC(Space Time Block Coding)을시간대신주파수상에구현한기술</p><p>ㅇ2 Tx 의경우: STBC(Alamouti codes)와같은방식을사용</p><p>ㅇ4 Tx 의경우: SFBC 와FSTD(Frequency Switched Transmit Diversity)를동시에사용함</p><ul><li>2. SM(Spatial Multiplexing)-Downlink</li></ul><p>ㅇ다른데이터를여러안테나경로로분리하여보냄으로써peak data rate 을증가시킬수있는기술</p><p>(각path 는같은time/frequency resource 를사용)</p><p>ㅇSU(Single User)-MIMO: Enb 와하나의UE 간SM 으로UE 의peak data rate 를증가시킴</p><p>ㅇMU(Multiuser)-MIMO: eNB 와여러개의UE 간SM 으로UE 의peak data rate를증가시키지는않고,</p><p>cell throughput 을증가시키는효과가있음</p><p>ㅇOpen-loop SM: UE 가빠른속도로이동하여채널이빨리변경되거나채널정보를알수없는경우, UE 의</p><p>PMI(Precoding Matrix Indicator) feedback 없이작동하는SM 방식</p><p>ㅇClosed-loop SM: UE 가느린속도로이동하여채널정보를알수있는경우, UE의PMI feedback 을eNB</p><p>에서수신하여작동하는SM 방식(codebook-based precoding)</p><ul><li>3. UL(Uplink) Transmit Antenna Selection-Uplink</li></ul><p>ㅇUE가1RF chain, 2Tx antenna를사용하고eNB에서UE로어떤Tx antenna를사용할것인지알려주는방식</p><p>ㅇClosed-loop selection of Tx antenna</p><p>ㅇMU(Multiuser) MIMO 또는Collaborative MIMO-Uplink</p><p>ㅇUL 에서2개의UE 가같은time/frequency resource 를사용하여동시에다른데이터를전송하는SM 방식</p><p>ㅇ각UE 는single Tx antenna 를사용</p><p>ㅇeNB 에서서로orthogonal 한두UE 를선택함</p><p>ㅇ각UE 의peak data rate 의증가는없지만전체cell throughput 을증가시킬수있음</p><p>출제분야: 장비운용</p><p>예）LTE MIMO 기법중SFBC(Space Frequency Block Coding)-Downlink 설명중틀린것은?</p><ul><li>1. 링크상의신뢰성증대(Peak data rate 의증가효과는없음)</li><li>2. STBC(Space Time Block Coding)을시간대신주파수상에구현한기술CQI</li><li>3. 2Tx 의경우: STBC(Alamouti codes)와같은방식을사용QCI</li><li>4. 4Tx 의경우: SFBC 와FSTD(Frequency Switched Transmit Diversity)를동시에사용함</li><li>5. UL 에서2 개의UE 가같은time/frequency resource 를사용하여동시에다른데이터를전송</li></ul><p><strong>LTE_공통 MIMO</strong></p><p>28</p><p>출제분야: 장비운용</p><p><strong>LTE_공통 무선환경Parameter 의미</strong></p><p>29</p><div class="memo-box"><div class="memo-box-title">💡 핵심 포인트</div><div class="memo-text">CA: 최대 5CC. MIMO TM1~TM9. 2x2 MIMO=2배, 4x4=4배 속도향상</div></div>'

title:'OFDMA/변조방식/BLER',
content:'<p><strong>LTE_공통 OFDMA &amp; SC-FDMA</strong></p><ul><li>OFDMA : 각각의Sub-carrier는하나의특정한Symbol 에관련된정보를전달.</li><li>SC-FDMA : 각각의Sub-carrier는모든전송Symbol 의정보를포함.</li></ul><p>Subcarrier 별로각기다른심볼이병렬전송되는OFDM 방식은최종단에서subcarrier</p><p>신호가합쳐져송신되면서PAPR이증가, 이에반하여순시적으로subcarrier 별로동일한</p><p>심볼이전송되는SC-FDMA 방식은최종단에서subcarrier가합쳐지더라도PAPR이</p><p>증가하지않음을개념적으로설명</p><p>출제분야: 장비운용</p><p>30</p><p><strong>LTE_공통 OFDMA &amp; SC-FDMA</strong></p><p>출제분야: 장비운용</p><p>31</p><p><strong>LTE_공통 OFDMA의ICI &amp; ISI</strong></p><p>출제분야: 장비운용</p><p>32</p><p><strong>LTE_공통 Modulation</strong></p><p><strong>LTE_공통 LTE 변조방법</strong></p><p>34</p><p>가.  왜곡의종류</p><ul><li>비선형외곡: PA포화시발생(AM-AM / AM-PM)</li></ul><p>→신호찌그러짐,스펙트럼확장(ACLR악화)</p><ul><li>위상/주파수왜곡</li></ul><p>→복조오류증가/ EVM악화</p><ul><li>멀티패스왜곡</li></ul><p>→반사/회절로신호여러경로도달(,ISI / 페이딩발생)</p><ul><li>IQ불균형</li></ul><p>→I/Q신호위상,이득차이(이미지간섭발생/ 복조성능저하)</p><ul><li>클리핑(Clipping)</li></ul><p>→ OFMD특성상Peak높음(신호일부잘림)</p><ul><li>혼변조왜곡(PIMD)</li></ul><p>→ RF신호처리과정중서로다른주파수의하모닉간의합과차의조합으로발생</p><p>→ 3rd IMD 요소가주로서비스주파수대역내RSSI에영향</p><p>→ 밴드광대역서비스로인한5rd IMD도RSSI 상승에원인</p><ul><li>문제점</li></ul><p>→ LTE 전체수신대역내불요신호발생</p><p>→ 불요신호제거불가시품질불량우려(UPLOAD 품질)</p><ul><li>해결책</li></ul><p>→이블/장비/커넥터간정합</p><p>→케이블곡률반경고려</p><p>→ 전송구간의방열/방수</p><p>→ Band 간적정Isolation 확보</p><p>→PIM 계측기를통한IMD검증</p><p>출제분야: 장비운용</p><p><strong>LTE_공통 왜곡</strong></p><p><strong>’예제 PIMD(Passive Inter-Modulation Distortion:수동혼변조왜곡) 조치방식이아닌것은?</strong></p><ul><li>1. 결합기재접속</li><li>2. Arrestor 콘넥터제작및조임불량</li><li>3. 안테나부조임불량</li><li>4. SFP 교체</li></ul><p><strong>LTE_공통 PIMD</strong></p><p>36</p><p>출제분야: 장비운용</p><p><strong>LTE_공통 BLER</strong></p><ul><li>공중선부조임에의한BLER 불량Point)</li></ul><p>37</p><p>망별장비</p><p>1/2&quot; 포설</p><p>7/8“ 포설</p><p>1-1/4” 포설</p><p>800M LTE</p><p>~40m 이하</p><p>40m초과~90m 이하</p><p>90m 초과</p><p>1.8G LTE</p><p>~25m 이하</p><p>25m초과~55m 이하</p><p>55m 초과</p><p>2.1G LTE</p><p>~25m 이하</p><p>25m초과~50m 이하</p><p>50m 초과</p><p>2.6G LTE</p><p>~25m 이하</p><p>25m초과~45m 이하</p><p>45m 초과</p><ul><li>1. LTE 공중선구성기본방침</li></ul><p>가. MIMO 구성: 모든지상LTE 장비의공중선은복편파안테나사용으로MIMO 구성원칙</p><p>나. 급전선구성</p><p>ㅇ2.6G 신설시1.8G/LTE/W망과공중선을공유</p><p>ㅇMiBOS는QRO 단독설치시급전선2본포설</p><p>ㅇPIM 예방위해안테나간이격거리준수(Isolation 50dB 이상확보)</p><p>다. 급전선적용기준</p><p>ㅇRU/RRU 장비적용기준</p><ul><li>신규국소에서결합사용시최상위주파수급전선기준적용</li><li>단기존800M는2.6G과결합하지않음(3rd IM/ 5th IM 발생)</li></ul><p>ㅇ공용/통합광중계기는통합되는망의가장높은주파수를기준으로한다</p><ul><li>800/1.8/2.1 통합: 2.1G 기준에맞는급전선포설</li><li>2.1/2.6G 통합: 2.6G 기준에맞는급전선포설</li><li>2. Ant. 분기기준</li></ul><p>가. 분기되는Ant.간급전선길이는동일</p><p>→ 급전선길이차이에의한위상차로대역통과특성이변화되어품질저하발생</p><p>출제분야: 장비운용</p><p><strong>LTE_공통 공중선엔지니어링Guide</strong></p><p>38</p><div class="memo-box"><div class="memo-box-title">💡 핵심 포인트</div><div class="memo-text">QPSK(2bit), 16QAM(4bit), 64QAM(6bit), 256QAM(8bit). BLER 10% 목표</div></div>'

title:'HD Voice/VoLTE/SIP',
content:'<p>출제분야: 장비운용</p><p><strong>LTE_공통 HD Voice 개요</strong></p><p>41</p><p><strong>LTE_공통 HD Voice 개요</strong></p><p>출제분야: 장비운용</p><p>42</p><p>출제분야: 장비운용</p><p>HD-VOICE 의Session Initiation Protocol 기본절차에서가장먼저올라오는Message를쓰시오.</p><p><strong>LTE_공통 HD Voice 호처리– SIP기반</strong></p><p>43</p><p>출제분야: 장비운용</p><p>HD VOICE Fail Code 중C/D에해당하는Code를서술하시오.</p><p><strong>LTE_공통 HD Voice 호처리및품질지표</strong></p><p>44</p><p>출제분야: 장비운용</p><p><strong>LTE_공통 HD Voice 품질지표</strong></p><p>45</p><p>IETF에서정의한Signaling Protocol로음성과화상통화같은Multimedia Session을</p><p>제어하기위해사용</p><p>통신하고자하는지능형단말(Phone, Conference, Instance Messenger, etc)들이</p><p>서로를식별하여그위치를찾고, 그들상호간에멀티미디어통신세션을</p><p>생성/삭제/수정하기위한절차를명시한응용계층의Signaling Protocol.</p><p>SIP란?</p><p>TCP, UDP에모두사용할수있으며, 사용자들을구분하기위해SIP URI를</p><p>사용함으로써IP 주소에종속되지않고서비스를제공</p><p>HTTP와SNMP의많은부분을그대로사용하여개발된텍스트기반으로구현용이</p><p>Personal (Session) Mobility 제공</p><p>다른Protocol과결합하여다양한서비스들을만들수있는유연성과확장성</p><p>Session 설정이간단하고빠름</p><p>특징</p><p>SIP(Session initiation Protocol ) 개요</p><p>SIP Message Type</p><p><strong>LTE_공통 SIP Protocol</strong></p><p>출제분야: 장비운용</p><p>46</p><p>출제분야: 장비운용</p><ul><li>HD Voice RRE Timer</li></ul><p><strong>LTE_공통 HD Voice</strong></p><p><strong>LTE_공통 HD Voice 주요기술</strong></p><p>48</p><p>출제분야: 장비운용</p><p>RoHC(RObust Header Compression)</p><p><strong>LTE_공통 HD Voice 주요기술</strong></p><p>49</p><p>출제분야: 장비운용</p><p>나. Semi-persistent scheduling</p><ul><li>Dynamic assignment</li></ul><p>→가장일반적인UL자원할당방법</p><p>→UE(UL자원요청)-&gt; eNB(UE에게UL자원할당) -&gt; ue(해당자원으로data전송)</p><ul><li>Semi-persistent scheduling</li></ul><p>→특정시간동안자원을특정UE에게persistent하게할당</p><p>→할당시간이후에도자원을사용하고싶으면재할당요청필요:</p><p>Semi-persistent scheduling</p><p>라. SRVCC(Single Radio Voice Call Continuity)</p><ul><li>LTE 상용초기에는음성을WCDMA망에서수용하는CSFB(Circuit Switched Fallback)방식사용하고있으나</li></ul><p>맘운용이복잡해지고N/W간천이에따른품질저하발생</p><ul><li>LTE 망의확장에따라VoLTE가도입되면서SRVCC를이용한기존CS망과의음성핸드오버</li><li>LTE Full Coverage시VoLTE Only 서비스가능</li></ul><p>SRVCC(Single Radio Voice Call Continuity)</p><p><strong>LTE_공통 HD Voice 주요기술</strong></p><p>50</p><p>학습자료</p><p>예시문제#1</p><ul><li>IP 주소의이해</li></ul><p>Dual Stack</p><p>하나의시스템(호스트또는라</p><p>우터)에서IPv4와IPv6를동시</p><p>에처리하는기술</p><ul><li>IPv4 단말은IPv4와통신</li><li>IPv6 단말은IPv6와통신</li><li>IPv4와IPv6를지원하는단말</li></ul><p>은모든단말과통신가능</p><p>Tunneling</p><p>Translation</p><p>IPv4 망과IPv6 망사이의연동</p><p>기술로IPv6 클라이언트가IPv4</p><p>서버에접속할때또는IPv4 클</p><p>라이언트가IPv6 서버에접속</p><ul><li>백본은IPv4만을지원</li><li>IPv4와IPv6간주소변환</li><li>NAT64를통하여IPv6-IPv4</li></ul><p>서버,단말간통신</p><p>기존IPv4 망을전달망으로사</p><p>용해섬처럼서로떨어져있는</p><p>IPv6 망들을연결</p><ul><li>IPv6 단말은터널을통하여</li></ul><p>IPv6와통신</p><ul><li>IPv4 통신은터널을통하지</li></ul><p>않고통신</p><p>구분</p><p>IPv4</p><p>IPv6</p><p>주소길이</p><p>32비트(약43억개)</p><p>128비트(거의무한대)</p><p>표시방식</p><p>10진수(192.168.0.1)</p><p>16진수(2001:0DB8:...)</p><p>주소개수</p><p>약43억개</p><p>거의무한대</p><p>보안성</p><p>별도설치(IPsec 선택)</p><p>기본탑재(IPsec 필수)</p><p>헤더구조</p><p>가변길이(복잡)</p><p>고정길이(단순, 처리속도향상)</p><ul><li>개념: TCP/IP 프로토콜환경에서호스트를식별하기위한32비트(IPv4) 또는128비트(IPv6) 주소</li><li>구조: 네트워크ID(소속네트워크) + 호스트ID(개별기기)</li><li>Subnet Mask: IP 주소에서네트워크부분과호스트부분을구분하기위한비트마스크</li><li>IPv4 vs IPv6 비교</li><li>IPv4 와IPv6 상호전환전략기술</li></ul><p><strong>LTE_공통 IP 주소체계</strong></p><p>출제분야: 장비운용</p><p>51</p><div class="memo-box"><div class="memo-box-title">💡 핵심 포인트</div><div class="memo-text">HD Voice: AMR-WB 코덱(50~7000Hz). VoLTE: IMS 기반. SIP INVITE→200OK→ACK</div></div>'

content:'<p>LTE 삼성</p><p>LTE_공통……………………………….....………….</p><p>삼성………………….………………………..…………</p><p>EKP………………….…………………………….……..</p><p>Nokia……………….……………………………….….</p><p>P2</p><p>P61</p><p>P94</p><p>P128</p><p>출제분야: 장비운용</p><ul><li>1. LTE DU 25 수용기준</li><li>Dual-Band RRU 수용시Front-Haul은주파수각각수용필요</li><li>채널카드별F/H구성으로DBRRU간Cascade 구성은불가함</li><li>정류기는-48V 적용필요</li><li>SFP 모듈은ARRU와동일하게구성</li><li>DU20의3/4Band 형상은기존과동일형상으로DU25 형상구성</li><li>기존800M 수용기존채널카드신규채널카드(30A)로변경시기존Port 구성동일유지</li><li>DU20의2Band 형상중800M 7셀이상인경우6셀단위로DU25 구성</li></ul><p><strong>LTE_삼성 H/W Spec.</strong></p><p>62</p><ul><li>800M+2.1G+2.6G(30M) 수용가능</li></ul><p>출제분야: 장비운용</p><ul><li>DU10의2Band 3셀형상2식을DU25 1식에6셀형상으로구성</li><li>DU10의800M 단독국소는6개씩DU25에수용</li><li>신규채널카드에800M와1.8G 주파수혼용불가로1.8G 단독기존DU25 분리수용</li><li>2. LTE DU 25 Cell 수용방안</li><li>800MHz 와1.8GHz를DSP분리수용시</li><li>채널카드기준최대8셀이내에서DSP당800MHz는최대5셀, 1.8GHz는2셀구성</li></ul><p>(LCC-1A는DSP당용량60M)</p><p>→ ex) 채널카드내800MHz : 1.8GHz Cat.M1 셀수= 1) 8:0, 2) 7:1, 3) 6:2, 4) 5:3</p><ul><li>Cell No규칙은DU20과동일한기준으로적용</li></ul><p>신규채널카드(30A)</p><p>DU20 채널카드</p><p>괄호는Cell No</p><p><strong>LTE_삼성 H/W Spec.</strong></p><p>63</p><p>출제분야: 장비운용</p><ul><li>800MHz 와1.8GHz를동일DSP 수용시</li><li>동일DSP내800MHz와1.8GHz를동시수용할경우, Cat.M1 은DSP당최대2셀구성가능</li><li>800MHz 와2.6GHz(10), 1.8GHz를LCC-1A 수용형상</li><li>DSP#1에800MHz와2.6GHz(10M) 3셀씩수용하고, DSP#2에1.8GHz 단독셀3셀가지수용후</li></ul><p>800M와1.8GHz에Cat.M1 서비스</p><ul><li>Cell No규칙은DU20과동일한기준으로적용</li><li>DSP#2에주파수혼용수용시20MHz : 10MHz = 2:1 or 1:2 조합만가능(총3셀수용)</li><li>CHC#1 혹은CHC#2에수용된셀을Pcell로잡을경우3CC CA만가능하나, CHC#0 셀을Pcell로</li></ul><p>잡을경우4CC CA가능</p><ul><li>CHC#0에3CC 수용및CHC#1과CHC#2에각각1CC씩수용시(Total 5CC) 4CC CA만동작하며,</li></ul><p>1개Band는MC Multi Carrier로동작</p><ul><li>DU20 형상및Port는기존과동일하게유지하고, DU25로Migration을통한작업시간단축</li><li>2Band 7셀이상수용DU20은분리후Migration 적용가능(DU20 DSP당2셀씩구성필요)</li><li>DSP내800M Cat.M1 셀3개제약으로인해위치변경됨(신규30A 채널카드는DSP 2개로셀수용)</li></ul><p>신규채널카드의DSP#0은별도용도로사용되어셀수용미지원</p><p><strong>LTE_삼성 H/W Spec.</strong></p><p>64</p><p>출제분야: 장비운용</p><ul><li>DU20에서는채널카드별주파수분리에따라4개주파수수용불가</li><li>DU20 활용2.6G20M 포함한3Band 구성방법</li></ul><p>→ 채널카드별주파수분리하고800M/1.8G/2.6G20M 구성(기존2.1G 구성방식과동일)</p><ul><li>DU20 활용2.6G20M 포함한2Band 구성방법</li></ul><p>→ 채널카드별주파수분리하고800M/2.6G20M 구성(기존1.8G 구성방식과동일)</p><ul><li>1.8GHz or 800MHz 전용수용시</li><li>채널카드기준6셀이내에서DSP당800MHz &amp; 1.8GHz는최대3셀eMTC 전용셀구성가능</li><li>LCC CHC의경우DSP당20M 2T4R 3Cell 형상미지원으로Copy로eMTC 지원불가</li></ul><p>→ DU25 는DSP 가2개로구성되어있으며LCC CHC 內, eMTC Cell 구성시, 아래와같이DSP 별</p><p>앞3개포트구성필요</p><p><strong>LTE_삼성 H/W Spec.</strong></p><p>65</p><p>출제분야: 장비운용</p><ul><li>2. LTE DU 30 수용기준</li><li>4Band CA 고려하여DU30 활용한2.6G 주파수수용</li><li>4Band 구성시고려사항(제약사항포함)</li></ul><p>→(DU30) : 채널카드내주파수혼용으로DSP 내2개주파수2:2 or 3:1 구성</p><p>→ 기존3Band CA + MC 형상으로4Band CA 조합지원은’17년이며, 최대5Band 수용가능</p><p>→ DSP당BW와무관하게2T2R 4개셀로제한되며, 4T4R의경우2개셀(성능제약) 구성가능</p><p>→ DSP당10M/20M 대역폭혼용미지원으로동일대역폭주파수수용</p><ul><li>DU30은기존3Band 지역에2.6G 주파수수용시채널카드내주파수혼용으로6/6/6/6/6 구성</li><li>4Band 5CC 구성(2.6G 30M) : 채널카드별주파수당2개씩2/2/2/2/2 구성</li><li>3Band 구성: 기본적으로DU20 활용하여구성이기준임</li><li>DU30 주파수간Cascade 구성도입</li><li>CPRI 압축50% = 40M 대역2.5G SFP 사용및주파수간Cascade 기능</li><li>2.6G 30M RRU(초단) ~ 800M(종단) Cascade 구성하고, 40M 대역폭압축을통해2.5G SFP 사용</li><li>Dual-Band RRU 수용시1개Front-Haul로연동가능</li><li>DU30 동일채널카드내1.8G와2.1G 수용으로1개Front-haul로1.8G+2.1G 연동Case1 가능하며,</li></ul><p>각각F/H 구성도Case2 가능</p><ul><li>DBRRU간Cascade는최대6개까지구성가능</li><li>정류기는-48V로연동필요</li></ul><p><strong>LTE_삼성 H/W Spec.</strong></p><p>66</p><ul><li>DU30 주요사항</li><li>망진화에따른성능향상및4Band CA(L6/L7)를위해신규DU30 도입</li><li>채널카드內주파수혼용가능하며, 4Band 구성가능</li><li>CPRI 압축및주파수Cascade 기능을활용한전송투자비절감가능</li></ul><p>출제분야: 장비운용</p><p><strong>LTE_삼성 H/W Spec.</strong></p><p>67</p><ul><li>DU30 B’D기능</li></ul><p>출제분야: 장비운용</p><p><strong>LTE_삼성 H/W Spec.</strong></p><p>68</p><ul><li>DU30 Cell수용방안</li></ul><p>가. DU30 활용4Band 5CC 구성방법</p><ul><li>채널카드내주파수혼용가능하고, 모뎀(DSP) 단위로2개주파수수용</li><li>2.6G 30M 동시투자에따라6/6/6/6/6 형상구성: 채널카드단위2/2/2/2/2 구성</li></ul><p>→2.6G 20M와10M 셀구분하여구성(현재DSP별20M/10M 대역폭혼용불가로20M 셀은1.8G와구성</p><p>→ 향후대역폭혼용가능시2.6G 20M 셀위치변경검토중</p> title:'Fronthaul 개념/광장비 공통',
content:'<p>출제분야: 장비운용</p><p>프론트홀[Front-haul]</p><p>이동통신의무선접속망에서디지털데이터처리장치(DU: Digital Unit)와</p><p>원격무선신호처리장치(RU: Radio Unit) 사이를연결하는링크.</p><p>프론트홀링크는디지털데이터처리장치(DU)와핵심망(core network)을연결하는</p><p>백홀(backhaul) 링크와상반되는의미로이동통신에서새로사용하는용어이다.</p><p>기지국의디지털데이터처리장치(DU)를분리시켜여러DU를한장소에모아관리하고,</p><p>기지국에는무선신호처리장치(RU)만설치하여분산시킨무선접속망을</p><p>클라우드무선접속망(C-RAN: Cloud Radio Access Network)이라한다.</p><p>이러한C-RAN 구조에서프론트홀은DU 사이트와RU를연결하는데이터링크이다.</p><ul><li>DU(Digital Unit)는베이스밴드장치(BBU: BaseBand Unit) 등으로도불리고,</li></ul><p>RU(Radio Unit)는원격무선장비(RRH: Remote Radio Head) 등으로도불린다.</p><p>프론트홀(fronthaul) 링크는주로고속의광케이블등으로구성되며,</p><p>동위상/직교데이터(I/Q data: In-phase and Quadrature data)를전달한다.</p><p><strong>광장비_공통 Front-haul</strong></p><p>4</p><p>출제분야: 장비운용</p><p><strong>광장비_공통 Tango Front-haul 감시분석</strong></p><p>5</p><p>출제분야: 장비운용</p><p><strong>광장비_공통 Front-haul</strong></p><p>6</p><p>DU 집중국</p><p>Ring</p><p>Mux</p><p>신규</p><p>PTS</p><p>eNB</p><p>S/W#</p><p>1</p><p>eNB</p><p>S/W#</p><p>2</p><p>DU</p><p>DU</p><p>DU</p><p>DU</p><p>RU</p><p>RU</p><p>RU</p><p>RU</p><p>RT#1</p><p>RT#2</p><p>RT#1</p><p>RT#2</p><p>COT</p><p>PTS</p><p>10G</p><p>PTS</p><p>10G</p><p>PTS</p><p>10G</p><p>PTS</p><p>10G</p><ul><li>1. DU 집중형(SCAN 구조).링먹스필요</li></ul><p>기존</p><p>1G PTS</p><p>기존</p><p>10G PTS</p><p>PTS</p><p>10G</p><p>PTS</p><p>10G</p><p>PTS</p><p>10G</p><p>PTS</p><p>10G</p><p>DU/RU</p><p>DU/RU</p><p>PTS</p><p>1G</p><p>PTS</p><p>1G</p><p>PTS</p><p>1G</p><ul><li>2. DU 분산형(기존기지국형태와동일</li></ul><p>)</p><p>o 링먹스특징</p><ul><li>다중광파장을하나의광선로로전송하기위한광MUX/DEMUX 기능</li><li>파장변환기능, 경로이중화지원, 상위감시기능, 광선로감시및자동절체기능</li><li>COT:RT = 1:2 구조이며, 링당2 Core 필요(2파장/1Core)</li></ul><p>출제분야: 장비운용</p><p><strong>광장비_공통 Front-haul(Ring-MUX)</strong></p><p>7</p><p>출제분야: 장비운용</p><p>Ring-MUX 전송거리및Link손실</p><ul><li>Long Path 최대거리(COT~RT~RT)      17 [Km]</li><li>Short Path 최대거리(COT~RT)           10 [Km]</li><li>Long Path 최대손실(COT~RT~RT)      10 [dB]</li><li>Short Path 최대손실(COT~RT)            6 [dB]</li></ul><p>광선로의하나의링망구성을2 Core로하여4개의기지국구성(1 Core 2 노드구성)</p><p><strong>광장비_공통 Front-haul(Ring-MUX)</strong></p><p>8</p><p><strong>광장비_공통 광섬유Filter 방식</strong></p><p>출제분야: 장비운용</p><p><strong>광장비_공통 Ring-Mux Topology</strong></p><p>출제분야: 장비운용</p><p><strong>광장비_공통 광점퍼케이블</strong></p><p>출제분야: 장비운용</p><p><strong>광장비_공통 광점퍼케이블</strong></p><p>12</p><p><strong>광장비_공통 광점퍼케이블</strong></p><p>13</p><p><strong>광장비_공통 H-SFP</strong></p><p><strong>광장비_공통 광점퍼케이블</strong></p><p>14</p><p>출제분야: 장비운용</p><p>OBSAI (Open Base Station Architecture Initiative)</p><ul><li>기지국구조에대한개방된specification을만들어내기위해기지국사업자,</li></ul><p>모듈과구성요소제조업자들(Hyundai, LGE, Nokia, Samsung, ZTE) 사이에서2002년9월에</p><p>Open Base Station Standard Initiative (OBSAI)가결성되었다.</p><ul><li>OBSAI 의목표는모듈들사이에내부적인터페이스에대해자세한규격과기본적인모듈러구조를</li></ul><p>정의함으로써셀룰러기지국을위한오픈마켓을창출하는것이다.</p><ul><li>그림에서제어모듈과다른세모듈(Transport Module, Baseband Module, RF Module)</li></ul><p>간의통신인터페이스로RP1를정의한다. RP3은베이스밴드및RF 모듈의인터페이스를정의하고,</p><p>RP2는전송모듈과베이스밴드모듈간의링크를정의한다.</p><ul><li>SCAN에서는사용되는CPRI Line Bit Rate는3072.0 Mbit/s, 6144 Mbit/s 이다.</li></ul><p>CPRI (Common Public Radio Interface)</p><ul><li>CPRI (Common Public Radio Interface)™은REC (Radio Equipment Control)와</li></ul><p>RE (Radio Equipment) 사이에무선기지국의주요내부인터페이스에대해공개적으로사용</p><p>가능한규격을정의하는것을목적으로하는산업협력단체이다.</p><ul><li>규격을정의하기위해협력중인주요산업체는Ericsson AB, Huawei Technologies Co. Ltd,</li></ul><p>NEC Corporation, Nortel Networks SA와Siemens AG가있다.</p><ul><li>규격에는전송, 연결, 제어를위해필요한항목들을가지며, 사용자측데이터, 제어와관리측면에서의</li></ul><p>전송방식그리고동기를위한데이터에대해서로다른정보흐름도가포함되고,</p><p>3GPP UTRA FDD release 5를따라야만한다.</p><ul><li>SCAN에서지원하는CPRI Line Bit Rate는Option 3: 2457.6 Mbit/s와</li></ul><p>Option 4: 3072.0 Mbit/s가있다.</p><p><strong>광장비_공통 CPRI/OBSAI Interface</strong></p><p>15</p><p>출제분야: 장비운용</p><p>여러개의서로다른파장의Laser λ를광학적으로혼합하여</p><p>대용량의광섬유대역폭을효과적으로사용하기위한기술</p><p>다중화된신호(Multiplexed Signal) 를단일광섬유이용전달</p><p>WDM 개요</p><p>λ 1</p><p>λ 2</p><p>λ 3</p><p>.</p><p>.</p><p>.</p><p>.</p><p>..</p><p>λ n</p><p>λ 1</p><p>λ 2</p><p>λ 3</p><p>.</p><p>.</p><p>.</p><p>.</p><p>..</p><p>λ n</p><p>WDM 장점</p><p>단일광섬유에최대160개Lambda(λ) 의파장을수용할수있어,</p><p>기존의TDM 에비하여비용효율적인용량확장가능</p><p>WDM 은Physical Layer 기술로서, SONET 을비롯하여ATM, Gigabit Ethernet, ESCON 및FICON 등의</p><p>다양한Protocol 과Data Format 수용가능</p><p>60 km2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>60 km</p><p>60 km</p><p>60 km</p><p>60 km</p><p>60 km</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>RPTR</p><p>2.5G</p><p>2.5G</p><p>2.5G</p><p>2.5G</p><p>2.5G</p><p>2.5G</p><p>2.5G</p><p><strong>광장비_공통 Ring-MUX Optical Wavelength 이해및구성</strong></p><p>16</p><div class="memo-box"><div class="memo-box-title">💡 핵심 포인트</div><div class="memo-text">Fronthaul: DU↔RU 구간 광전송. CPRI/eCPRI 인터페이스. 광레벨 기준</div></div>'
